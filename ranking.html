<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU RANKING</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:32px;
color:#7fffd4;
}

nav{
text-align:center;
padding:15px;
background:#03151f;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
padding:6px 12px;
border-radius:6px;
}

nav a.active{
background:#0b2435;
color:#7fffd4;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU RANKING
</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html" class="active">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<div class="grid">

<div id="chart_catch" class="chart"></div>
<div id="chart_size" class="chart"></div>

<div id="chart_river" class="chart"></div>
<div id="chart_point" class="chart"></div>

<div id="chart_rod" class="chart"></div>
<div id="chart_weather" class="chart"></div>

<div id="chart_water" class="chart"></div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data=data.filter(r=>r["匹数"])

let catchRank={}
let sizeRank={}
let riverData={}
let pointData={}
let rodData={}
let weatherData={}
let waterData={}

data.forEach(row=>{

let catchNum=Number(row["匹数"])||0
let size=Number(row["平均サイズ"])||0

catchRank[row["日付"]]=(catchRank[row["日付"]]||0)+catchNum
sizeRank[row["日付"]]=(sizeRank[row["日付"]]||0)+size

let river=row["河川"]
riverData[river]=(riverData[river]||0)+catchNum

let point=row["ポイント"]
pointData[point]=(pointData[point]||0)+catchNum

let rod=row["竿名"]
rodData[rod]=(rodData[rod]||0)+catchNum

let weather=row["天候"]
weatherData[weather]=(weatherData[weather]||0)+catchNum

let water=row["水位"]
waterData[water]=(waterData[water]||0)+catchNum

})

drawChart("chart_catch","釣果ランキング",catchRank)
drawChart("chart_size","平均サイズランキング",sizeRank)
drawChart("chart_river","河川ランキング",riverData)
drawChart("chart_point","ポイントランキング",pointData)
drawChart("chart_rod","竿名ランキング",rodData)
drawChart("chart_weather","天候ランキング",weatherData)
drawChart("chart_water","水位ランキング",waterData)

})

}

function drawChart(id,title,obj){

let arr=Object.entries(obj)

arr.sort((a,b)=>b[1]-a[1])

arr=arr.slice(0,5)

let dataArr=[[title,"値"]]

arr.forEach(v=>{
dataArr.push([v[0],v[1]])
})

let data=google.visualization.arrayToDataTable(dataArr)

let chart=new google.visualization.ColumnChart(
document.getElementById(id)
)

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4"},
backgroundColor:"transparent",
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
})

}

</script>

</body>
</html>
