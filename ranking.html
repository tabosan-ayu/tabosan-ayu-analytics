<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU RANKING</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:32px;
color:#7fffd4;
}

nav{
text-align:center;
padding:15px;
background:#03151f;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:40px;
}

th,td{
padding:12px;
border-bottom:1px solid #0b2c3f;
text-align:center;
}

th{
color:#7fffd4;
}

</style>
</head>

<body>

<header>
TABOSAN AYU RANKING
</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<h2>釣果ランキング</h2>

<table id="catchRank">
<tr>
<th>順位</th>
<th>匹数</th>
<th>日付</th>
<th>河川</th>
<th>ポイント</th>
</tr>
</table>


<h2>平均サイズランキング</h2>

<table id="sizeRank">
<tr>
<th>順位</th>
<th>平均サイズ</th>
<th>日付</th>
<th>河川</th>
</tr>
</table>

</div>


<script>

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data=data.filter(r=>r["匹数"])


//釣果ランキング
let catchRank=[...data]
.sort((a,b)=>b["匹数"]-a["匹数"])
.slice(0,10)

let catchTable=document.getElementById("catchRank")

catchRank.forEach((r,i)=>{

let row=catchTable.insertRow()

row.innerHTML=`
<td>${i+1}</td>
<td>${r["匹数"]}</td>
<td>${r["日付"]}</td>
<td>${r["河川"]}</td>
<td>${r["ポイント"]}</td>
`

})


//平均サイズランキング
let sizeRank=[...data]
.sort((a,b)=>b["平均サイズ"]-a["平均サイズ"])
.slice(0,10)

let sizeTable=document.getElementById("sizeRank")

sizeRank.forEach((r,i)=>{

let row=sizeTable.insertRow()

row.innerHTML=`
<td>${i+1}</td>
<td>${r["平均サイズ"]}cm</td>
<td>${r["日付"]}</td>
<td>${r["河川"]}</td>
`

})

})

</script>

</body>
</html>
