<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU EFFICIENCY</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}
header{background:#041822;padding:25px;text-align:center;font-size:32px;color:#7fffd4;}
nav{text-align:center;background:#041822;padding:10px 0;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
nav a.active{color:#7fffd4;}
.container{width:90%;max-width:1500px;margin:auto;padding:30px;}
.grid{display:flex;flex-wrap:wrap;gap:25px;}
.chart{background:#0b2435;padding:20px;border-radius:10px;min-width:300px;flex:1 1 auto;height:320px;}
</style>
</head>
<body>

<header>
TABOSAN AYU EFFICIENCY
</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html" class="active">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">
<div class="grid">
<div id="chart_eff_river" class="chart"></div>
<div id="chart_eff_point" class="chart"></div>
<div id="chart_eff_rod" class="chart"></div>
<div id="chart_eff_weather" class="chart"></div>
<div id="chart_eff_water" class="chart"></div>
</div>
</div>

<script>
google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadEfficiency);

const sheetURL="https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadEfficiency(){
  fetch(sheetURL).then(res=>res.json()).then(data=>{
    data=data.filter(r=>r["効率"]);
    const river={}, point={}, rod={}, weather={}, water={};

    data.forEach(r=>{
      const eff = Number(r["効率"])||0;
      river[r["河川"]] = Math.max(river[r["河川"]]||0,eff);
      point[r["ポイント"]] = Math.max(point[r["ポイント"]]||0,eff);
      rod[r["竿名"]] = Math.max(rod[r["竿名"]]||0,eff);
      weather[r["天候"]] = Math.max(weather[r["天候"]]||0,eff);
      water[r["水位"]] = Math.max(water[r["水位"]]||0,eff);
    });

    drawTop5("chart_eff_river","河川効率トップ5",river);
    drawTop5("chart_eff_point","ポイント効率トップ5",point);
    drawTop5("chart_eff_rod","竿効率トップ5",rod);
    drawTop5("chart_eff_weather","天候効率トップ5",weather);
    drawTop5("chart_eff_water","水位効率トップ5",water);
  });
}

function drawTop5(id,title,obj){
  let arr=Object.entries(obj);
  arr.sort((a,b)=>b[1]-a[1]);
  arr=arr.slice(0,5); // 上位5位
  let dataArr=[[title,"効率"]];
  arr.forEach(v=>dataArr.push([v[0],v[1]]));
  let data=google.visualization.arrayToDataTable(dataArr);
  let chart=new google.visualization.ColumnChart(document.getElementById(id));
  chart.draw(data,{
    title:title,
    titleTextStyle:{color:"#7fffd4"},
    backgroundColor:"transparent",
    legend:{textStyle:{color:"white"}},
    hAxis:{textStyle:{color:"white"}},
    vAxis:{textStyle:{color:"white"}}
  });
}
</script>

</body>
</html>
