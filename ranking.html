<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU RANKING</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#081c2c;
color:white;
margin:0;
}

header{
text-align:center;
padding:25px;
font-size:28px;
background:#061520;
}

nav{
text-align:center;
padding:10px;
background:#061520;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:40px;
background:#0c2a3d;
}

th,td{
padding:10px;
border-bottom:1px solid #244a6a;
text-align:center;
}

th{
background:#0f3c5f;
}

</style>
</head>

<body>

<header>
TABOSAN AYU RANKING
</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<h2>釣果ランキング</h2>

<table id="catchTable">
<tr>
<th>順位</th>
<th>匹数</th>
<th>日付</th>
<th>河川</th>
<th>ポイント</th>
</tr>
</table>

<h2>平均サイズランキング</h2>

<table id="sizeTable">
<tr>
<th>順位</th>
<th>平均サイズ</th>
<th>日付</th>
<th>河川</th>
</tr>
</table>

</div>

<script>

const url="https://opensheet.elk.sh/YOUR_SHEET_ID/DATA"

fetch(url)
.then(res=>res.json())
.then(data=>{

//釣果ランキング
let catchRank=[...data].sort((a,b)=>b["匹数"]-a["匹数"]).slice(0,10)

let catchTable=document.getElementById("catchTable")

catchRank.forEach((d,i)=>{

let row=catchTable.insertRow()

row.innerHTML=`
<td>${i+1}</td>
<td>${d["匹数"]}</td>
<td>${d["日付"]}</td>
<td>${d["河川"]}</td>
<td>${d["ポイント"]}</td>
`

})

//平均サイズランキング
let sizeRank=[...data].sort((a,b)=>b["平均サイズ"]-a["平均サイズ"]).slice(0,10)

let sizeTable=document.getElementById("sizeTable")

sizeRank.forEach((d,i)=>{

let row=sizeTable.insertRow()

row.innerHTML=`
<td>${i+1}</td>
<td>${d["平均サイズ"]}</td>
<td>${d["日付"]}</td>
<td>${d["河川"]}</td>
`

})

})

</script>

</body>
</html>
