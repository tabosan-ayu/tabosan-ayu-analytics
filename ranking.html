<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU RANKING</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}
header{background:#041822;padding:25px;text-align:center;font-size:32px;color:#7fffd4;}
nav{text-align:center;background:#041822;padding:10px 0;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
nav a.active{color:#7fffd4;}
.container{max-width:1500px;margin:auto;padding:30px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:25px;}
.chart{background:#0b2435;padding:20px;border-radius:10px;height:320px;}
</style>
</head>
<body>
<header>
TABOSAN AYU RANKING
</header>
<nav>
<a href="index.html">HOME</a>
<a href="ranking.html" class="active">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>
<div class="container">
<div class="grid">
<div id="chart_catch" class="chart"></div>
<div id="chart_avgSize" class="chart"></div>
<div id="chart_river" class="chart"></div>
<div id="chart_point" class="chart"></div>
<div id="chart_rod" class="chart"></div>
<div id="chart_weather" class="chart"></div>
<div id="chart_water" class="chart"></div>
</div>
</div>
<script>
google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);
const sheetURL = "https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){
fetch(sheetURL).then(res=>res.json()).then(data=>{
data=data.filter(r=>r["匹数"]);
let catchData={}, avgSizeData={}, riverData={}, pointData={}, rodData={}, weatherData={}, waterData={};
data.forEach(r=>{
let c=Number(r["匹数"])||0;
catchData[r["日付"]]=(catchData[r["日付"]]||0)+c;
avgSizeData[r["日付"]]=(avgSizeData[r["日付"]]||0)+Number(r["平均サイズ"]||0);
riverData[r["河川"]]=(riverData[r["河川"]]||0)+c;
pointData[r["ポイント"]]=(pointData[r["ポイント"]]||0)+c;
rodData[r["竿名"]]=(rodData[r["竿名"]]||0)+c;
weatherData[r["天候"]]=(weatherData[r["天候"]]||0)+c;
waterData[r["水位"]]=(waterData[r["水位"]]||0)+c;
});
drawChart("chart_catch","釣果ランキング",catchData);
drawChart("chart_avgSize","平均サイズランキング",avgSizeData);
drawChart("chart_river","河川ランキング",riverData);
drawChart("chart_point","ポイントランキング",pointData);
drawChart("chart_rod","竿ランキング",rodData);
drawChart("chart_weather","天候ランキング",weatherData);
drawChart("chart_water","水位ランキング",waterData);
});
}

function drawChart(id,title,obj){
let arr=Object.entries(obj);
arr.sort((a,b)=>b[1]-a[1]);
let dataArr=[[title,"値"]];
arr.forEach(v=>dataArr.push([v[0],v[1]]));
let data=google.visualization.arrayToDataTable(dataArr);
let chart=new google.visualization.ColumnChart(document.getElementById(id));
chart.draw(data,{title:title,titleTextStyle:{color:"#7fffd4"},backgroundColor:"transparent",legend:{textStyle:{color:"white"}},hAxis:{textStyle:{color:"white"}},vAxis:{textStyle:{color:"white"}}});
}
</script>
</body>
</html>
