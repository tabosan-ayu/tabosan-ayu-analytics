<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU PHOTO</title>

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:4px;
color:#7fffd4;
background:#061520;
}

nav{
display:flex;
justify-content:center;
gap:40px;
background:#05121a;
padding:10px;
}

nav a{
color:#7fffd4;
text-decoration:none;
}

nav a.active{
border-bottom:2px solid #7fffd4;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

/* サムネイル */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* モーダル */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* 左右ボタン */
.modal button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:white;
font-size:40px;
cursor:pointer;
}

#prev{left:20px;}
#next{right:20px;}

</style>
</head>

<body>

<div id="common"></div>

<script>
fetch("common.test.html")
.then(res => res.text())
.then(data => {

document.getElementById("common").innerHTML = data;

const links = document.querySelectorAll("nav a");
links.forEach(link => {
const href = link.getAttribute("href");
if(href && location.href.includes(href)){
link.classList.add("active");
}
});

});
</script>

<div class="container">

<h2>AYU GALLERY</h2>

<div class="gallery" id="gallery"></div>

</div>

<!-- モーダル -->
<div class="modal" id="modal">
<button id="prev">◀</button>
<img id="modalImg">
<button id="next">▶</button>
</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{

/* ========= ③フォルダ風データ ========= */
const photos = [
"2026-07-10/1.jpg",
"2026-07-10/2.jpg",
"2026-07-10/3.jpg",
"2026-07-15/1.jpg",
"2026-07-15/2.jpg"
];

/* ========= 生成 ========= */
const gallery=document.getElementById("gallery");

photos.forEach(src=>{
const img=document.createElement("img");
img.src="photos/"+src;
gallery.appendChild(img);
});

/* ========= モーダル ========= */
const images=document.querySelectorAll(".gallery img");
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");

let currentIndex=0;

images.forEach((img,index)=>{
img.addEventListener("click", ()=>{
modal.style.display="flex";
modalImg.src=img.src;
currentIndex=index;
});
});

/* 次 */
document.getElementById("next").onclick=()=>{
currentIndex=(currentIndex+1)%images.length;
modalImg.src=images[currentIndex].src;
};

/* 前 */
document.getElementById("prev").onclick=()=>{
currentIndex=(currentIndex-1+images.length)%images.length;
modalImg.src=images[currentIndex].src;
};

/* クリックで閉じる */
modal.addEventListener("click", ()=>{
modal.style.display="none";
});

/* ========= ④ESCキー ========= */
document.addEventListener("keydown", (e)=>{
if(e.key==="Escape"){
modal.style.display="none";
}
});

});

</script>

</body>
</html>
