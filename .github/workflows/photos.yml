- name: Create JSON
  run: |
    echo "{" > photos.json

    first_dir=true

    find photos -type f \( -iname "*.jpg" -o -iname "*.png" \) | sort | awk -F/ '
    {
      dir=$2;
      file=$3;

      if (dir != current) {
        if (NR > 1) {
          printf "]"
        }
        if (NR > 1) {
          printf ","
        }
        printf "\n\"%s\": [", dir
        current=dir
        first=1
      }

      if (!first) {
        printf ","
      }

      printf "\"%s\"", file
      first=0
    }
    END {
      if (NR > 0) {
        printf "]\n"
      }
    }' >> photos.json

    echo "}" >> photos.json
