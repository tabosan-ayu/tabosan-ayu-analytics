name: Auto Photo List

on:
  push:
    paths:
      - 'photos/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create JSON
        run: |
          echo "{" > photos.json

          current=""

          find photos -type f \( -iname "*.jpg" -o -iname "*.png" \) | sort | while read file; do
            dir=$(dirname "$file" | sed 's|photos/||')
            name=$(basename "$file")

            if [ "$dir" != "$current" ]; then
              if [ "$current" != "" ]; then
                echo "] ," >> photos.json
              fi
              echo "\"$dir\": [" >> photos.json
              current="$dir"
            else
              echo "," >> photos.json
            fi

            echo -n "\"$name\"" >> photos.json
          done

          echo "]" >> photos.json
          echo "}" >> photos.json

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos.json
          git commit -m "auto update photos.json" || echo "no change"
          git push
