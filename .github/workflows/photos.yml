name: Auto Photo List

on:
  push:
    paths:
      - 'photos/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create JSON
        run: |
          rm -f photos.json
          echo "[" > photos.json
          find photos -type f -name "*.jpg" | awk '{print "\"" $0 "\","}' >> photos.json
          sed -i '$ s/,$//' photos.json
          echo "]" >> photos.json

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos.json
          git commit -m "force update" || true
          git push
