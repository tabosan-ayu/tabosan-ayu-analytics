name: Auto Photo List

on:
  push:
    paths:
      - 'photos/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create JSON
        run: |
          echo "[" > photos.json
          find photos -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) \
          | sed 's|photos/||' \
          | awk '{print "\"" $0 "\","}' >> photos.json
          sed -i '$ s/,$//' photos.json
          echo "]" >> photos.json

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos.json
          git commit -m "auto update photos.json" || echo "no change"
          git push
