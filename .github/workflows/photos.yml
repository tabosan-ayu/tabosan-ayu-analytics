- name: Safe JSON Build
  run: |
    set -e

    if [ ! -d photos ]; then
      echo "{}" > photos.json
      exit 0
    fi

    echo "{" > photos.json

    find photos -type f \( -iname "*.jpg" -o -iname "*.png" \) | sort | awk -F/ '
    {
      dir=$2; file=$3;

      if (!(dir in seen)) {
        if (count > 0) printf "],";
        printf "\n\"%s\":[", dir;
        seen[dir]=1;
        count++;
        first=1;
      }

      if (!first) printf ",";
      printf "\"%s\"", file;
      first=0;
    }
    END{
      if(count>0) printf "]\n";
    }' >> photos.json

    echo "}" >> photos.json
