<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

/* ===== 上部 ===== */
.top-area{
position:relative;
text-align:center;
margin-bottom:40px;
}

/* 戻る（left:30% + 中央補正） */
.back{
position:absolute;
left:30%;
transform:translateX(-50%);

padding:16px 36px;
font-size:20px;
font-weight:bold;

background:#061520;
color:#7fffd4;
border:none;
border-radius:12px;
cursor:pointer;

box-shadow:0 0 15px rgba(127,255,212,0.3);
}

.back:hover{
background:#0a2a38;
}

/* タイトル */
#title{
font-size:22px;
margin:0;
opacity:0.8;
}

/* ===== 一覧（カードUI） ===== */
.list{
display:flex;
flex-direction:column;
align-items:center;
}

.list button{
width:60%;
min-width:300px;
max-width:500px;

margin:16px 0;
padding:26px;

font-size:36px;
font-weight:bold;
letter-spacing:1px;

background:#061520;
color:#7fffd4;
border:none;
border-radius:14px;
cursor:pointer;

box-shadow:0 0 15px rgba(0,255,200,0.08);
transition:0.2s;
}

.list button:hover{
transform:scale(1.03);
background:#0a2a38;
}

/* ===== ギャラリー ===== */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:zoom-in;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* ===== モーダル ===== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-area">
<button class="back" onclick="history.back()">← 戻る</button>
<h2 id="title"></h2>
</div>

<div id="content"></div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

const params = new URLSearchParams(location.search);
const folder = params.get("folder");

fetch("photos.json")
.then(res => res.json())
.then(data => {

const content = document.getElementById("content");
const title = document.getElementById("title");

// ===== 一覧 =====
if (!folder) {

title.innerText = "PHOTO一覧";

const list = document.createElement("div");
list.className = "list";

Object.keys(data)
.sort((a,b)=>b.localeCompare(a))
.forEach(f => {

const btn = document.createElement("button");

btn.innerHTML = `
  <div>${f}</div>
  <div style="font-size:16px;color:#aaa">${data[f].length}枚</div>
`;

btn.onclick = () => {
location.href = "photo.html?folder=" + f;
};

list.appendChild(btn);

});

content.appendChild(list);
return;
}

// ===== 写真 =====

title.innerText = folder + "（" + (data[folder]?.length || 0) + "枚）";

if (!data[folder] || data[folder].length === 0){
content.innerHTML = "写真なし";
return;
}

const gallery = document.createElement("div");
gallery.className = "gallery";

data[folder].forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;
img.loading = "lazy";

img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

content.appendChild(gallery);

});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

// Escで閉じる
document.addEventListener("keydown", e=>{
if(e.key==="Escape"){
document.getElementById("modal").style.display="none";
}
});

</script>

</body>
</html>
