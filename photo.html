<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.top-area{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:40px;
padding-top:20px;
}

/* 戻る（固定） */
.back{
position:fixed;
top:20px;
left:20px;
z-index:1000;

padding:16px 36px;
font-size:20px;
font-weight:bold;

background:#061520;
color:#7fffd4;
border:none;
border-radius:12px;
cursor:pointer;

box-shadow:0 0 15px rgba(127,255,212,0.3);
}

.back:hover{
background:#0a2a38;
}

#title{
font-size:48px;
font-weight:bold;
margin-top:50px;
}

/* 一覧 */
.list{
display:flex;
flex-direction:column;
align-items:center;
}

.list button{
width:60%;
min-width:300px;
max-width:500px;

margin:16px 0;
padding:26px;

font-size:36px;
font-weight:bold;

background:#061520;
color:#7fffd4;
border:none;
border-radius:14px;
cursor:pointer;

transition:0.2s;
}

.list button:hover{
transform:scale(1.03);
background:#0a2a38;
}

/* ★ 改善：小さめ＋枚数増対応 */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:16px;
}

/* ★ 改善：hoverで大きく */
.gallery img{
width:100%;
border-radius:10px;
cursor:zoom-in;
transition:0.25s;
}

.gallery img:hover{
transform:scale(1.2);
position:relative;
z-index:10;
}

/* モーダル */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<button class="back" onclick="history.back()">← 戻る</button>

<div class="container">

<div class="top-area">
<h2 id="title">読み込み中...</h2>
</div>

<div id="content">Loading...</div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

const params = new URLSearchParams(location.search);
const folder = params.get("folder");

const content = document.getElementById("content");
const title = document.getElementById("title");

// データ取得
fetch("photos.json?v=" + Date.now())
.then(res => {
  if(!res.ok) throw new Error("JSON取得失敗");
  return res.json();
})
.then(data => {

// 一覧
if (!folder) {

title.innerText = "PHOTO一覧";

const list = document.createElement("div");
list.className = "list";

Object.keys(data)
.sort((a,b)=>b.localeCompare(a))
.forEach(f => {

const btn = document.createElement("button");
btn.innerHTML = `${f}（${data[f].length}枚）`;

btn.onclick = () => {
location.href = "photo.html?folder=" + f;
};

list.appendChild(btn);

});

content.innerHTML="";
content.appendChild(list);
return;
}

// 写真
title.innerText = `${folder}（${data[folder]?.length || 0}枚）`;

if (!data[folder] || data[folder].length === 0){
content.innerHTML = "写真なし";
return;
}

const gallery = document.createElement("div");
gallery.className = "gallery";

data[folder].forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;
img.loading = "lazy";

img.onerror = () => {
img.style.display = "none";
};

img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

content.innerHTML="";
content.appendChild(gallery);

})
.catch(err=>{
console.error(err);
title.innerText = "エラー";
content.innerHTML = "写真データ取得失敗";
});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

// Esc閉じる
document.addEventListener("keydown", e=>{
if(e.key==="Escape"){
document.getElementById("modal").style.display="none";
}
});

</script>

</body>
</html>
