<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.back{
margin-bottom:20px;
padding:10px 20px;
background:#061520;
color:#7fffd4;
border:none;
border-radius:5px;
cursor:pointer;
}

.back:hover{
background:#0a2a38;
}
</style>
</head>

<body>

<div class="container">

<button class="back" onclick="location.href='photo.html'">← 戻る</button>

<h2 id="title"></h2>

<div class="gallery" id="gallery"></div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

// フォルダ取得
const params = new URLSearchParams(location.search);
const folder = params.get("folder");

// タイトル
document.getElementById("title").innerText = folder;

// JSON読み込み
fetch("photos.json")
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery");

(data[folder] || []).forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;

// クリックで拡大
img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

</script>

</body>
</html>
