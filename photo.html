<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h2 id="title"></h2>
<div class="gallery" id="gallery"></div>
</div>

<script>

// フォルダ取得
const params = new URLSearchParams(location.search);
const folder = params.get("folder");

// タイトル表示
document.getElementById("title").innerText = folder;

// JSON読み込み
fetch("photos.json")
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery");

// フォルダ内画像表示
(data[folder] || []).forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;

gallery.appendChild(img);

});

});

</script>

</body>
</html>
