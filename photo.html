<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU PHOTO</title>

<style>
body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:4px;
color:#7fffd4;
background:#061520;
}

nav{
display:flex;
justify-content:center;
gap:40px;
background:#05121a;
padding:10px;
}

nav a{
color:#7fffd4;
text-decoration:none;
}

nav a.active{
border-bottom:2px solid #7fffd4;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.folder{
padding:30px;
border:1px solid #7fffd4;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.folder:hover{
background:#0a2a38;
}
</style>
</head>

<body>

<div id="common"></div>

<script>
fetch("common.test.html")
.then(res => res.text())
.then(data => {

document.getElementById("common").innerHTML = data;

const links = document.querySelectorAll("nav a");
links.forEach(link => {
const href = link.getAttribute("href");
if(href && location.href.includes(href)){
link.classList.add("active");
}
});

});
</script>

<div class="container">
<h2>AYU GALLERY</h2>
<div class="gallery" id="gallery"></div>
</div>

<script>

// フォルダ一覧表示
fetch("photos.json")
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery");

Object.keys(data).forEach(folder => {

const div = document.createElement("div");
div.className = "folder";
div.innerText = folder;

div.onclick = () => {
location.href = "photo.html?folder=" + folder;
};

gallery.appendChild(div);

});

});
</script>

</body>
</html>
