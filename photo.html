<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 20px 40px; /* 上に余白追加（固定ボタン分） */
}

/* ===== 戻るボタン（強化版） ===== */
.back{
position:fixed;
top:20px;
left:20px;
z-index:1000;

padding:16px 32px;
background:#061520;
color:#7fffd4;
border:none;
border-radius:12px;
cursor:pointer;

font-size:20px;
font-weight:bold;

box-shadow:0 0 15px rgba(127,255,212,0.3);
}

.back:hover{
background:#0a2a38;
}

/* ===== 一覧 ===== */
.list button{
display:block;
width:100%;
margin:10px 0;
padding:18px;
background:#061520;
color:#7fffd4;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.list button:hover{
background:#0a2a38;
}

/* ===== ギャラリー ===== */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:zoom-in;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* ===== モーダル ===== */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<button class="back" onclick="history.back()">← 戻る</button>

<div class="container">

<h2 id="title"></h2>

<div id="content"></div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

// URLパラメータ
const params = new URLSearchParams(location.search);
const folder = params.get("folder");

// JSON取得
fetch("photos.json")
.then(res => res.json())
.then(data => {

const content = document.getElementById("content");
const title = document.getElementById("title");

// =================
// 一覧
// =================
if (!folder) {

title.innerText = "PHOTO一覧";

const list = document.createElement("div");
list.className = "list";

Object.keys(data)
.sort((a,b)=>b.localeCompare(a))
.forEach(f => {

const btn = document.createElement("button");
btn.textContent = f + " (" + data[f].length + "枚)";

btn.onclick = () => {
location.href = "photo.html?folder=" + f;
};

list.appendChild(btn);

});

content.appendChild(list);
return;
}

// =================
// 写真表示
// =================

title.innerText = folder + " (" + (data[folder]?.length || 0) + "枚)";

if (!data[folder] || data[folder].length === 0){
content.innerHTML = "写真なし";
return;
}

const gallery = document.createElement("div");
gallery.className = "gallery";

data[folder].forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;
img.loading = "lazy";

// クリックで拡大
img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

content.appendChild(gallery);

});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

// Escキーで閉じる
document.addEventListener("keydown", e=>{
if(e.key==="Escape"){
document.getElementById("modal").style.display="none";
}
});

</script>

</body>
</html>
