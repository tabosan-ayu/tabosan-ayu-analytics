<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU PHOTO</title>

<style>
body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:4px;
color:#7fffd4;
background:#061520;
}

nav{
display:flex;
justify-content:center;
gap:40px;
background:#05121a;
padding:10px;
}

nav a{
color:#7fffd4;
text-decoration:none;
}

nav a.active{
border-bottom:2px solid #7fffd4;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.date-btn{
cursor:pointer;
padding:15px;
border-bottom:1px solid #444;
font-size:18px;
}

.date-btn:hover{
background:#033040;
}

.back{
cursor:pointer;
margin-bottom:20px;
color:#7fffd4;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div id="common"></div>

<script>
fetch("common.test.html")
.then(res => res.text())
.then(data => {
document.getElementById("common").innerHTML = data;

const links = document.querySelectorAll("nav a");
links.forEach(link => {
const href = link.getAttribute("href");
if(href && location.href.includes(href)){
link.classList.add("active");
}
});
});
</script>

<div class="container">
<h2>AYU GALLERY</h2>
<div id="gallery"></div>
</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

fetch("photos.json?nocache=" + Date.now())
.then(res => {
if(!res.ok) throw new Error("JSON取得失敗");
return res.json();
})
.then(data => {

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

// =====================
// グループ化
// =====================
const groups = {};

data.forEach(src => {

if(!src) return;

src = src.trim();

// 日付抽出（安全）
const parts = src.split("/");
if(parts.length < 3) return;

const date = parts[1];

if(!groups[date]) groups[date] = [];

groups[date].push(src);

});

// =====================
// 日付一覧
// =====================
Object.keys(groups)
.sort()
.reverse()
.forEach(date => {

const btn = document.createElement("div");
btn.textContent = date;
btn.className = "date-btn";

btn.onclick = () => showImages(date);

gallery.appendChild(btn);

});

// =====================
// 画像表示
// =====================
function showImages(date){

gallery.innerHTML = "";

const back = document.createElement("div");
back.textContent = "← 戻る";
back.className = "back";
back.onclick = () => location.reload();

gallery.appendChild(back);

const div = document.createElement("div");
div.className = "gallery";

groups[date].forEach(src => {

const img = document.createElement("img");

// ★ここが最重要（固定パス）
img.src = "/tabosan-ayu-analytics/" + src;

img.onerror = () => {
console.log("画像エラー:", img.src);
};

img.onclick = () => {
modal.style.display = "flex";
modalImg.src = img.src;
};

div.appendChild(img);

});

gallery.appendChild(div);
}

// =====================
// モーダル閉じる
// =====================
modal.onclick = () => modal.style.display = "none";

})
.catch(err => {
console.error("JSON読み込み失敗", err);
});

</script>

</body>
</html>
