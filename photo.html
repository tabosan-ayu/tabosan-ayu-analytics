<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU PHOTO</title>

<style>
body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:4px;
color:#7fffd4;
background:#061520;
}

nav{
display:flex;
justify-content:center;
gap:40px;
background:#05121a;
padding:10px;
}

nav a{
color:#7fffd4;
text-decoration:none;
}

nav a.active{
border-bottom:2px solid #7fffd4;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div id="common"></div>

<script>
fetch("common.test.html")
.then(res => res.text())
.then(data => {

document.getElementById("common").innerHTML = data;

const links = document.querySelectorAll("nav a");
links.forEach(link => {
const href = link.getAttribute("href");
if(href && location.href.includes(href)){
link.classList.add("active");
}
});

});
</script>

<div class="container">
<h2>AYU GALLERY</h2>
<div class="gallery" id="gallery"></div>
</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

// JSON読み込み
fetch("photos.json")
.then(res => res.json())
.then(data => {

const gallery = document.getElementById("gallery");

data.forEach(src => {

const img = document.createElement("img");
img.src = "photos/" + src;   // ←ここが重要

img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

</script>

</body>
</html>
