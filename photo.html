<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU PHOTO</title>

<style>
body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.date-btn{
cursor:pointer;
padding:15px;
border-bottom:1px solid #444;
}

.back{
cursor:pointer;
margin-bottom:20px;
color:#7fffd4;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<div class="container">
<h2>AYU GALLERY</h2>
<div id="gallery"></div>
</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<!-- ★JSは一番下 -->
<script>

console.log("JSスタート");

fetch("photos.json?nocache=" + Date.now())
.then(res => res.json())
.then(data => {

console.log("JSON:", data);

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

const groups = {};

// 日付グループ化（確実版）
data.forEach(src => {

if(!src) return;

src = src.trim();

const parts = src.split("/");

if(parts.length < 3) return;

const date = parts[1];

if(!groups[date]) groups[date] = [];

groups[date].push(src);

});

console.log("groups:", groups);

// 日付一覧
Object.keys(groups)
.sort()
.reverse()
.forEach(date => {

const btn = document.createElement("div");
btn.textContent = date;
btn.className = "date-btn";

btn.onclick = () => showImages(date);

gallery.appendChild(btn);

});

// 画像表示
function showImages(date){

gallery.innerHTML = "";

const back = document.createElement("div");
back.textContent = "← 戻る";
back.className = "back";
back.onclick = () => location.reload();

gallery.appendChild(back);

const div = document.createElement("div");
div.className = "gallery";

groups[date].forEach(src => {

const img = document.createElement("img");

// ★確実パス
img.src = "/tabosan-ayu-analytics/" + src;

img.onerror = () => console.log("画像エラー:", img.src);

img.onclick = () => {
modal.style.display = "flex";
modalImg.src = img.src;
};

div.appendChild(img);

});

gallery.appendChild(div);
}

// モーダル閉じる
modal.onclick = () => modal.style.display = "none";

})
.catch(err => console.error("JSONエラー:", err));

</script>

</body>
</html>
