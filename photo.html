<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PHOTO</title>

<style>
body{
background:#021018;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

/* 一覧ボタン */
.list button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
background:#061520;
color:#7fffd4;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.list button:hover{
background:#0a2a38;
}

/* ギャラリー */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* モーダル */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* 戻る */
.back{
margin-bottom:20px;
padding:10px 20px;
background:#061520;
color:#7fffd4;
border:none;
border-radius:5px;
cursor:pointer;
}

.back:hover{
background:#0a2a38;
}
</style>
</head>

<body>

<div class="container">

<button class="back" onclick="history.back()">← 戻る</button>

<h2 id="title"></h2>

<div id="content"></div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

// パラメータ取得
const params = new URLSearchParams(location.search);
const folder = params.get("folder");

// JSON取得
fetch("photos.json")
.then(res => res.json())
.then(data => {

const content = document.getElementById("content");

// =====================
// 一覧表示
// =====================
if (!folder) {

document.getElementById("title").innerText = "PHOTO一覧";

const list = document.createElement("div");
list.className = "list";

Object.keys(data).forEach(f => {

const btn = document.createElement("button");
btn.textContent = f;

btn.onclick = () => {
location.href = "photo.html?folder=" + f;
};

list.appendChild(btn);

});

content.appendChild(list);
return;
}

// =====================
// 写真表示
// =====================

document.getElementById("title").innerText = folder;

const gallery = document.createElement("div");
gallery.className = "gallery";

(data[folder] || []).forEach(file => {

const img = document.createElement("img");
img.src = "photos/" + folder + "/" + file;

// クリック拡大
img.onclick = () => {
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = img.src;
};

gallery.appendChild(img);

});

content.appendChild(gallery);

});

// モーダル閉じる
document.getElementById("modal").addEventListener("click", ()=>{
document.getElementById("modal").style.display="none";
});

</script>

</body>
</html>
