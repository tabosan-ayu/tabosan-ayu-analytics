<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:32px;
color:#7fffd4;
}

nav{
text-align:center;
background:#041822;
padding:10px 0;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a.active{
color:#7fffd4;
}

.container{
max-width:1500px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
overflow-x:auto;
}

.card{
background:#0b2435;
padding:20px;
border-radius:10px;
text-align:center;
}

.card-title{
color:#7fffd4;
}

.card-value{
font-size:28px;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
overflow-x:auto;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
}

.latest{
background:#0b2435;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<nav>
<a href="index.html" class="active">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div id="totalCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div id="tripCount" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div id="avgCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均効率</div>
<div id="avgEff" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均サイズ</div>
<div id="avgSize" class="card-value">-</div>
</div>

</div>

<div class="grid">

<div id="chart_month" class="chart"></div>
<div id="chart_river" class="chart"></div>
<div id="chart_point" class="chart"></div>

<div class="latest">
<h3>最近の釣果</h3>
<div id="latestFishing"></div>
</div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL = "https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data = data.filter(r=>r["匹数"])

let totalCatch = 0
let tripCount = data.length
let effTotal = 0
let sizeTotal = 0

let monthData = {}
let riverData = {}
let pointData = {}

data.forEach(row=>{
let catchNum = Number(row["匹数"])||0
totalCatch += catchNum

let eff = Number(row["効率"])||0
effTotal += eff

let size = Number(row["平均サイズ"])||0
sizeTotal += size

let month = row["月"]
monthData[month]=(monthData[month]||0)+catchNum

let river = row["河川"]
riverData[river]=(riverData[river]||0)+catchNum

let point = row["ポイント"]
pointData[point]=(pointData[point]||0)+catchNum
})

let avgCatch = (totalCatch/tripCount||0).toFixed(1)
let avgEff = (effTotal/tripCount||0).toFixed(2)
let avgSize = (sizeTotal/tripCount||0).toFixed(1)

document.getElementById("totalCatch").innerText=totalCatch+"匹"
document.getElementById("tripCount").innerText=tripCount+"回"
document.getElementById("avgCatch").innerText=avgCatch+"匹"
document.getElementById("avgEff").innerText=avgEff+"匹/h"
document.getElementById("avgSize").innerText=avgSize+"cm"

drawChart("chart_month","月別釣果",monthData)
drawPie("chart_river","河川割合",riverData)
drawChart("chart_point","ポイント別釣果",pointData)

showLatest(data)

})
}

function drawChart(id,title,obj){
let arr=Object.entries(obj)
arr.sort((a,b)=>b[1]-a[1])
let dataArr=[[title,"値"]]
arr.forEach(v=>{dataArr.push([v[0],v[1]])})
let data=google.visualization.arrayToDataTable(dataArr)
let chart=new google.visualization.ColumnChart(document.getElementById(id))
chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4"},
backgroundColor:"transparent",
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
})
}

function drawPie(id,title,obj){
let dataArr=[[title,"値"]]
Object.entries(obj).forEach(v=>{dataArr.push(v)})
let data=google.visualization.arrayToDataTable(dataArr)
let chart=new google.visualization.PieChart(document.getElementById(id))
chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4"},
backgroundColor:"transparent",
legend:{textStyle:{color:"white"}}
})
}

function showLatest(data){
let html=""
data.slice(-5).reverse().forEach(r=>{
html+=`<p>${r["日付"]}　${r["河川"]}　${r["匹数"]}匹</p>`
})
document.getElementById("latestFishing").innerHTML=html
}

</script>

</body>
</html>
