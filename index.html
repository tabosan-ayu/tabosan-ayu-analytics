<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1620;
color:white;
}

.sidebar{
position:fixed;
width:200px;
height:100%;
background:#0f1f2e;
padding-top:30px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.sidebar h2{
text-align:center;
color:#33d17a;
}

.menu{
margin-top:40px;
}

.menu a{
display:block;
padding:15px 30px;
color:white;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
background:#1e3347;
}

.main{
margin-left:200px;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:#13212e;
padding:25px;
border-radius:16px;
box-shadow:0 0 10px rgba(0,255,170,0.15);
animation:glow 4s infinite alternate;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(0,255,170,0.6);
}

@keyframes glow{

0%{
box-shadow:0 0 8px rgba(0,255,170,0.2);
}

100%{
box-shadow:0 0 18px rgba(0,255,170,0.4);
}

}

.chart{
height:300px;
}

.title{
margin-bottom:15px;
font-size:18px;
color:#7ee7b7;
}

</style>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(drawChart);

function drawChart(){

var data = google.visualization.arrayToDataTable([
['月','匹数'],
['6月',22],
['7月',30],
['8月',18],
['9月',40]
]);

var options={

backgroundColor:'transparent',

legend:{textStyle:{color:'white'}},

hAxis:{textStyle:{color:'white'}},

vAxis:{textStyle:{color:'white'}},

animation:{
startup:true,
duration:1200,
easing:'out'
},

colors:['#33d17a']
};

var chart=new google.visualization.AreaChart(document.getElementById('chart1'));

chart.draw(data,options);

}

</script>

</head>

<body>

<div class="sidebar">

<h2>AYU LAB</h2>

<div class="menu">

<a href="#">ダッシュボード</a> <a href="#">河川分析</a> <a href="#">竿分析</a> <a href="#">ポイント分析</a> <a href="#">写真</a>

</div>

</div>

<div class="main">

<div class="grid">

<div class="card">
<div class="title">総釣果</div>
<h1>22</h1>
</div>

<div class="card">
<div class="title">平均効率</div>
<h1>2.3</h1>
</div>

<div class="card">
<div class="title">最大サイズ</div>
<h1>25cm</h1>
</div>

<div class="card">
<div class="title">月別釣果</div>
<div id="chart1" class="chart"></div>
</div>

<div class="card">
<div class="title">ベストポイント</div>
<h2>白鳥</h2>
</div>

<div class="card">
<div class="title">ベスト竿</div>
<h2>TF</h2>
</div>

</div>

</div>

</body>
</html>
