<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#061520;
padding:20px;
text-align:center;
font-size:28px;
color:#7fffd4;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b2435;
padding:20px;
border-radius:10px;
text-align:center;
}

.card-title{
color:#7fffd4;
margin-bottom:5px;
}

.card-value{
font-size:26px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.chart-box{
background:#0b2435;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div id="totalCatch" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div id="totalTrips" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div id="avgCatch" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">平均効率</div>
<div id="avgEff" class="card-value">0</div>
</div>

<div class="card">
<div class="card-title">最大サイズ</div>
<div id="maxSize" class="card-value">0</div>
</div>

</div>

<div class="grid">

<div class="chart-box">
<div id="chart_month" style="height:300px;"></div>
</div>

<div class="chart-box">
<div id="chart_river" style="height:300px;"></div>
</div>

</div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTZhvDGwcXLjhciH5hLInYGPzmNmUxmXySU9X-WsppJv8cmewEA008bSOvGtwkP_5zofepEj12Ix6ZI/pub?output=csv";

google.charts.load('current',{packages:['corechart']});

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.split("\n").slice(1);

let totalCatch=0;
let totalTrips=0;
let maxSize=0;
let effTotal=0;

let monthData={};
let riverData={};

rows.forEach(r=>{

const c=r.split(",");

const river=c[1];
const size=parseFloat(c[12]);
const catchNum=parseInt(c[9]);
const eff=parseFloat(c[15]);
const month=c[16];

if(!isNaN(catchNum)){

totalCatch+=catchNum;
totalTrips++;

if(!monthData[month]) monthData[month]=0;
monthData[month]+=catchNum;

if(!riverData[river]) riverData[river]=0;
riverData[river]+=catchNum;

}

if(!isNaN(size)){
if(size>maxSize) maxSize=size;
}

if(!isNaN(eff)){
effTotal+=eff;
}

});

const avgCatch=(totalCatch/totalTrips).toFixed(1);
const avgEff=(effTotal/totalTrips).toFixed(2);

document.getElementById("totalCatch").innerText=totalCatch+"匹";
document.getElementById("totalTrips").innerText=totalTrips+"回";
document.getElementById("avgCatch").innerText=avgCatch;
document.getElementById("avgEff").innerText=avgEff;
document.getElementById("maxSize").innerText=maxSize+"cm";

drawCharts(monthData,riverData);

});
