<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#04121c,#021018,#000a12);
color:white;
margin:0;
}

header{
background:#081018;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

nav{
display:flex;
justify-content:center;
gap:60px;
background:#07141f;
padding:15px;
}

nav a{
color:#7fe7d6;
text-decoration:none;
font-size:18px;
letter-spacing:2px;
}

nav a:hover{
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.title{
text-align:center;
font-size:40px;
letter-spacing:4px;
color:#6fffe9;
margin-bottom:40px;
}

.cards{
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
flex:1;
min-width:180px;
background:#0d2335;
border-radius:14px;
padding:25px;
text-align:center;
box-shadow:0 0 10px rgba(0,255,200,0.2);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,255,200,0.4);
}

.card-title{
color:#7fffd4;
margin-bottom:10px;
font-size:18px;
}

.card-value{

}

.chart-box{

}

.section-title{
text-align:center;
font-size:22px;
margin-bottom:20px;
color:#7fffd4;
}

.latest{
background:#0d2335;
padding:25px;
border-radius:14px;
box-shadow:0 0 10px rgba(0,255,200,0.2);
}

.latest div{
padding:6px 0;
border-bottom:1px solid #123;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<nav>

</nav>

<div class="container">

2026 SEASON SUMMARY
</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(drawChart);

function drawChart(){

var data=google.visualization.arrayToDataTable([
['月','釣果'],
['6月',20],
['7月',60],
['8月',90],
['9月',55]
]);

var options={
backgroundColor:'transparent',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
colors:['#2ee6c9']
};

var chart=new google.visualization.ColumnChart(document.getElementById('monthly_chart'));

chart.draw(data,options);

}

</script>

</body>
