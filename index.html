<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(160deg,#06121c,#02080f);
color:white;
}

/* メニュー */

.topbar{
display:flex;
justify-content:center;
gap:100px;
padding:25px;
background:#081a28;
box-shadow:0 0 30px rgba(0,255,200,0.15);
}

.topbar a{
color:#9fe3ff;
text-decoration:none;
font-size:26px;
letter-spacing:2px;
}

.topbar a:hover{
color:#33ffd2;
}

/* タイトル */

.title{
text-align:center;
font-size:44px;
margin-top:40px;
margin-bottom:40px;
color:#7fffd4;
letter-spacing:3px;
}

/* カード */

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:60px;
max-width:1500px;
margin:auto;
padding:20px;
}

.stat{
background:#0d2234;
padding:35px 25px;
border-radius:18px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,200,0.08);
transition:0.3s;
}

.stat:hover{
transform:translateY(-6px);
box-shadow:0 0 45px rgba(0,255,200,0.35);
}

.stat h3{
margin:0;
font-size:20px;
color:#7fffd4;
}

.stat p{
margin:15px 0 0 0;
font-size:52px;
font-weight:bold;
}

/* グラフ */

.chartbox{
max-width:1500px;
margin:60px auto;
background:#0d2234;
border-radius:20px;
padding:40px;
box-shadow:0 0 35px rgba(0,255,200,0.1);
}

.charttitle{
text-align:center;
font-size:24px;
color:#7fffd4;
margin-bottom:20px;
}

canvas{
height:200px !important;
max-width:900px;
margin:auto;
display:block;
}

</style>

</head>

<body>

<div class="topbar">
<a href="index.html">HOME</a>
<a href="#">DATA</a>
<a href="dashboard.html">ANALYTICS</a>
<a href="#">PHOTO</a>
</div>

<div class="title">2026 SEASON SUMMARY</div>

<div class="stats">

<div class="stat">
<h3>総釣果</h3>
<p>245匹</p>
</div>

<div class="stat">
<h3>釣行回数</h3>
<p>18回</p>
</div>

<div class="stat">
<h3>平均釣果</h3>
<p>13.6匹</p>
</div>

<div class="stat">
<h3>平均効率</h3>
<p>2.4匹/h</p>
</div>

<div class="stat">
<h3>最大サイズ</h3>
<p>25cm</p>
</div>

</div>

<div class="chartbox">

<div class="charttitle">月別釣果</div>

<canvas id="monthChart"></canvas>

</div>

<script>

const ctx=document.getElementById("monthChart").getContext("2d");

const gradient=ctx.createLinearGradient(0,0,0,300);
gradient.addColorStop(0,"#45ffd0");
gradient.addColorStop(1,"#007a6a");

new Chart(ctx,{
type:"bar",
data:{
labels:["6月","7月","8月","9月"],
datasets:[{
label:"釣果",
data:[20,60,90,55],
backgroundColor:gradient,
borderRadius:6,
hoverBackgroundColor:"#7fffd4"
}]
},
options:{
plugins:{
legend:{labels:{color:"white"}}
},
scales:{
x:{
ticks:{color:"#9fe3ff"},
grid:{display:false}
},
y:{
ticks:{color:"#9fe3ff"},
grid:{color:"rgba(255,255,255,0.05)"}
}
}
}
});

</script>

</body>
</html>
