<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:32px;
color:#7fffd4;
}

nav{
text-align:center;
padding:10px;
}

nav a{
color:#7fffd4;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
}

.card{
background:#0b2435;
padding:20px;
border-radius:10px;
}

.card-title{
color:#7fffd4;
}

.card-value{
font-size:30px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<nav>

<a href="index.html">HOME</a>

<a href="analytics.html">ANALYTICS</a>

</nav>

<div class="container">

<h2>2026 SEASON SUMMARY</h2>

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div id="totalCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div id="tripCount" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div id="avgCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均効率</div>
<div id="avgEff" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">最大サイズ</div>
<div id="maxSize" class="card-value">-</div>
</div>

</div>

</div>

<script>

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data=data.filter(r=>r["匹数"])

let total=0
let max=0
let eff=0

data.forEach(r=>{

let c=Number(r["匹数"])||0
total+=c

let s=Number(r["最大サイズ"])||0
if(s>max)max=s

eff+=Number(r["効率"])||0

})

let avg=(total/data.length).toFixed(1)
let avgEff=(eff/data.length).toFixed(2)

document.getElementById("totalCatch").innerText=total+"匹"
document.getElementById("tripCount").innerText=data.length+"回"
document.getElementById("avgCatch").innerText=avg+"匹"
document.getElementById("avgEff").innerText=avgEff+"匹/h"
document.getElementById("maxSize").innerText=max+"cm"

})

</script>

</body>
</html>
