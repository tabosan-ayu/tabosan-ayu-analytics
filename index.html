<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(#021018,#00070d);
color:white;
margin:0;
}

header{
background:#061520;
padding:25px;
text-align:center;
font-size:30px;
color:#7fffd4;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b2435;
padding:20px;
border-radius:10px;
text-align:center;
}

.card-title{
color:#7fffd4;
}

.card-value{
font-size:28px;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:30px;
}

.chart-box{
background:#0b2435;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div id="totalCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div id="tripCount" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div id="avgCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均効率</div>
<div id="avgEff" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">最大サイズ</div>
<div id="maxSize" class="card-value">-</div>
</div>

</div>


<div class="grid">

<div class="chart-box">
<div id="monthChart" style="height:280px;"></div>
</div>

<div class="chart-box">
<div id="riverChart" style="height:280px;"></div>
</div>

<div class="chart-box">
<div id="sizeChart" style="height:280px;"></div>
</div>

<div class="chart-box">
<div id="timeChart" style="height:280px;"></div>
</div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const SHEET="https://opensheet.elk.sh/1VW63HjLHVUwC9w6cgnAvt-oV3cItpSSY4a5Ykq2VtXk/DATA";

function loadData(){

fetch(SHEET)
.then(res=>res.json())
.then(data=>{

let total=0;
let maxSize=0;
let effTotal=0;

let month={};
let river={};
let size={};
let time={};

data.forEach(r=>{

let catchNum=Number(r.匹数)||0;

total+=catchNum;

let sizeNum=Number(r["最大サイズ"])||0;

if(sizeNum>maxSize)maxSize=sizeNum;

effTotal+=Number(r["効率(匹/時間)"])||0;

let m=r.月;
month[m]=(month[m]||0)+catchNum;

let rv=r.河川;
river[rv]=(river[rv]||0)+catchNum;

let s=Math.floor(r["最大サイズ"]);
size[s]=(size[s]||0)+1;

let t=r.開始;
time[t]=(time[t]||0)+catchNum;

});

let trips=data.length;
let avg=(total/trips).toFixed(1);
let eff=(effTotal/trips).toFixed(2);

document.getElementById("totalCatch").innerText=total+"匹";
document.getElementById("tripCount").innerText=trips+"回";
document.getElementById("avgCatch").innerText=avg+"匹";
document.getElementById("avgEff").innerText=eff+"匹/h";
document.getElementById("maxSize").innerText=maxSize+"cm";

drawCharts(month,river,size,time);

});

}

function drawCharts(month,river,size,time){

let m=[["月","釣果"]];
Object.keys(month).forEach(k=>m.push([k+"月",month[k]]));

let r=[["河川","釣果"]];
Object.keys(river).forEach(k=>r.push([k,river[k]]));

let s=[["サイズ","匹"]];
Object.keys(size).forEach(k=>s.push([k+"cm",size[k]]));

let t=[["時間","匹"]];
Object.keys(time).forEach(k=>t.push([k,time[k]]));

new google.visualization.ColumnChart(document.getElementById("monthChart"))
.draw(google.visualization.arrayToDataTable(m),{backgroundColor:"transparent"});

new google.visualization.PieChart(document.getElementById("riverChart"))
.draw(google.visualization.arrayToDataTable(r),{backgroundColor:"transparent"});

new google.visualization.ColumnChart(document.getElementById("sizeChart"))
.draw(google.visualization.arrayToDataTable(s),{backgroundColor:"transparent"});

new google.visualization.PieChart(document.getElementById("timeChart"))
.draw(google.visualization.arrayToDataTable(t),{backgroundColor:"transparent"});

}

</script>

</body>
</html>
