<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:#0b1620;
color:white;
margin:0;
}

header{
background:#081018;
padding:25px;
font-size:32px;
text-align:center;
font-weight:bold;
}

.container{
width:1200px;
max-width:95%;
margin:auto;
padding:20px;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.summary-card{
background:#13202c;
padding:24px;
border-radius:10px;
text-align:center;
}

.summary-card h3{
margin:0 0 10px 0;
color:#9ecbff;
}

.summary-card p{
font-size:30px;
font-weight:bold;
margin:0;
}

.card{
background:#13202c;
padding:30px;
border-radius:10px;
margin-top:20px;
}

</style>

<script>

google.charts.load('current',{'packages':['corechart']});
google.charts.setOnLoadCallback(initCharts);

const SHEET="1VW63HjLHVUwC9w6cgnAvt-oV3cItpSSY4a5Ykq2VtXk";

function fetchSheet(name){
return fetch(`https://opensheet.elk.sh/${SHEET}/${name}`)
.then(res=>res.json());
}

function drawBar(id,title,label,value,rows){

const data=google.visualization.arrayToDataTable([
[label,value],
...rows
]);

const options={
title:title,
backgroundColor:"#13202c",
titleTextStyle:{color:"white"},
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
};

new google.visualization.BarChart(
document.getElementById(id)
).draw(data,options);

}

function drawColumn(id,title,label,value,rows){

const data=google.visualization.arrayToDataTable([
[label,value],
...rows
]);

const options={
title:title,
backgroundColor:"#13202c",
titleTextStyle:{color:"white"},
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
};

new google.visualization.ColumnChart(
document.getElementById(id)
).draw(data,options);

}

async function initCharts(){

const month=await fetchSheet("WEB_MONTH");
const point=await fetchSheet("POINT_RANK");
const size=await fetchSheet("SIZE_RANK");
const efficiency=await fetchSheet("POINT_EFFICIENCY");
const river=await fetchSheet("RIVER_MONTH");
const rod=await fetchSheet("POINT_ROD");
const water=await fetchSheet("POINT_WATER_RANK");
const time=await fetchSheet("POINT_TIME_RANK");
const weather=await fetchSheet("POINT_WEATHER_RANK");
const today=await fetchSheet("TODAY");

const monthRows=month.map(r=>[r.月+"月",Number(r.匹数)]);
drawColumn("monthChart","月別釣果","月","釣果",monthRows);

const pointRows=point.map(r=>[r.ポイント,Number(r.総釣果||r.匹数)]);
drawBar("pointChart","ポイントランキング","ポイント","匹数",pointRows);

const sizeRows=size.map(r=>[
r.ポイント||r.河川||r.竿名,
Number(r.最大サイズ||r.サイズ)
]);
drawBar("sizeChart","サイズランキング","項目","サイズ",sizeRows);

const effRows=efficiency.map(r=>[
r.ポイント,
Number(r["平均匹数"]||r.効率||0)
]);
drawBar("effChart","効率ランキング","ポイント","平均匹数",effRows);

const riverRows=river.map(r=>[r.河川,Number(r.匹数)]);
drawBar("riverChart","河川ランキング","河川","匹数",riverRows);

const rodRows=rod.map(r=>[
r.竿略称||r.竿名,
Number(r["sum 匹数"]||r.匹数)
]);
drawBar("rodChart","竿ランキング","竿","匹数",rodRows);

const waterRows=water.map(r=>[r.水位,Number(r.匹数)]);
drawBar("waterChart","水位ランキング","水位","匹数",waterRows);

const timeRows=time.map(r=>[r.時間帯,Number(r.匹数)]);
drawBar("timeChart","時間帯ランキング","時間帯","匹数",timeRows);

const weatherRows=weather.map(r=>[r.天候,Number(r.匹数)]);
drawBar("weatherChart","天候ランキング","天候","匹数",weatherRows);

const total=monthRows.reduce((a,b)=>a+b[1],0);
const trips=today.length;
const avg=(total/trips).toFixed(1);
const max=Math.max(...sizeRows.map(r=>r[1]));

document.getElementById("totalCatch").innerText=total+"匹";
document.getElementById("totalTrips").innerText=trips+"回";
document.getElementById("avgCatch").innerText=avg+"匹";
document.getElementById("maxSize").innerText=max+"cm";

}

</script>

</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="summary-grid">

<div class="summary-card">
<h3>総釣果</h3>
<p id="totalCatch">-</p>
</div>

<div class="summary-card">
<h3>釣行回数</h3>
<p id="totalTrips">-</p>
</div>

<div class="summary-card">
<h3>平均釣果</h3>
<p id="avgCatch">-</p>
</div>

<div class="summary-card">
<h3>最大サイズ</h3>
<p id="maxSize">-</p>
</div>

</div>

<div class="card">
<h2>月別釣果</h2>
<div id="monthChart" style="height:500px"></div>
</div>

<div class="card">
<h2>ポイントランキング</h2>
<div id="pointChart" style="height:500px"></div>
</div>

<div class="card">
<h2>サイズランキング</h2>
<div id="sizeChart" style="height:500px"></div>
</div>

<div class="card">
<h2>効率ランキング</h2>
<div id="effChart" style="height:500px"></div>
</div>

<div class="card">
<h2>河川ランキング</h2>
<div id="riverChart" style="height:500px"></div>
</div>

<div class="card">
<h2>竿ランキング</h2>
<div id="rodChart" style="height:500px"></div>
</div>

<div class="card">
<h2>水位ランキング</h2>
<div id="waterChart" style="height:500px"></div>
</div>

<div class="card">
<h2>時間帯ランキング</h2>
<div id="timeChart" style="height:500px"></div>
</div>

<div class="card">
<h2>天候ランキング</h2>
<div id="weatherChart" style="height:500px"></div>
</div>

</div>

</body>
</html>
