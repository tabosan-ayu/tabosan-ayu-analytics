<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  background:#021018;
  color:white;
  margin:0;
}

header{
  background:#041822;
  padding:25px;
  text-align:center;
  font-size:32px;
  color:#7fffd4;
}

nav{
  text-align:center;
  padding:15px;
  background:#03151f;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  padding:6px 12px;
  border-radius:6px;
}

nav a.active{
  background:#0b2435;
  color:#7fffd4;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:30px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#0b2435;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.card-title{
  color:#7fffd4;
}

.card-value{
  font-size:28px;
  margin-top:5px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.chart{
  background:#0b2435;
  padding:20px;
  border-radius:10px;
  height:320px;
}

.latest{
  background:#0b2435;
  padding:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<nav>
<a href="index.html" class="active">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<!-- 年間サマリーカード -->
<div class="cards">
  <div class="card">
    <div class="card-title">総釣果</div>
    <div id="totalCatch" class="card-value">-</div>
  </div>
  <div class="card">
    <div class="card-title">釣行回数</div>
    <div id="tripCount" class="card-value">-</div>
  </div>
  <div class="card">
    <div class="card-title">平均釣果</div>
    <div id="avgCatch" class="card-value">-</div>
  </div>
  <div class="card">
    <div class="card-title">平均効率</div>
    <div id="avgEff" class="card-value">-</div>
  </div>
  <div class="card">
    <div class="card-title">平均サイズ</div>
    <div id="avgSize" class="card-value">-</div>
  </div>
</div>

<!-- 今年のベスト条件カード -->
<div class="cards">
  <div class="card">
    <div class="card-title">ベスト河川</div>
    <div class="card-value" id="bestRiver">-</div>
  </div>
  <div class="card">
    <div class="card-title">ベストポイント</div>
    <div class="card-value" id="bestPoint">-</div>
  </div>
  <div class="card">
    <div class="card-title">ベスト天候</div>
    <div class="card-value" id="bestWeather">-</div>
  </div>
  <div class="card">
    <div class="card-title">ベスト水位</div>
    <div class="card-value" id="bestWater">-</div>
  </div>
</div>

<!-- メイングラフ -->
<div class="grid">
<div id="chart_month" class="chart"></div>
<div id="chart_river" class="chart"></div>
<div id="chart_point" class="chart"></div>
<div class="latest">
<h3>最近の釣果</h3>
<div id="latestFishing"></div>
</div>
</div>

</div>

<script>
google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  data = data.filter(r=>r["匹数"]);

  // 集計用
  let totalCatch=0, tripCount=data.length, effTotal=0, sizeTotal=0;
  let monthData={}, riverData={}, pointData={};

  let riverEff={}, pointEff={}, weatherEff={}, waterEff={};
  let rc={}, pc={}, wc={}, wc2={};

  data.forEach(row=>{
    let catchNum=Number(row["匹数"])||0;
    totalCatch += catchNum;
    let eff=Number(row["効率"])||0;
    effTotal += eff;
    let size=Number(row["平均サイズ"])||0;
    sizeTotal += size;

    let month=row["月"];
    monthData[month]=(monthData[month]||0)+catchNum;

    let river=row["河川"];
    riverData[river]=(riverData[river]||0)+catchNum;
    riverEff[river]=(riverEff[river]||0)+eff;
    rc[river]=(rc[river]||0)+1;

    let point=row["ポイント"];
    pointData[point]=(pointData[point]||0)+catchNum;
    pointEff[point]=(pointEff[point]||0)+eff;
    pc[point]=(pc[point]||0)+1;

    let weather=row["天候"];
    weatherEff[weather]=(weatherEff[weather]||0)+eff;
    wc[weather]=(wc[weather]||0)+1;

    let water=row["水位"];
    waterEff[water]=(waterEff[water]||0)+eff;
    wc2[water]=(wc2[water]||0)+1;
  });

  // 平均値
  document.getElementById("totalCatch").innerText = totalCatch + "匹";
  document.getElementById("tripCount").innerText = tripCount + "回";
  document.getElementById("avgCatch").innerText = (totalCatch/tripCount||0).toFixed(1)+"匹";
  document.getElementById("avgEff").innerText = (effTotal/tripCount||0).toFixed(2)+"匹/h";
  document.getElementById("avgSize").innerText = (sizeTotal/tripCount||0).toFixed(1)+"cm";

  // ベスト条件表示
  function best(obj){ return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0][0]; }
  for(let k in riverEff) riverEff[k] = riverEff[k]/rc[k];
  for(let k in pointEff) pointEff[k] = pointEff[k]/pc[k];
  for(let k in weatherEff) weatherEff[k] = weatherEff[k]/wc[k];
  for(let k in waterEff) waterEff[k] = waterEff[k]/wc2[k];

  document.getElementById("bestRiver").innerText = best(riverEff);
  document.getElementById("bestPoint").innerText = best(pointEff);
  document.getElementById("bestWeather").innerText = best(weatherEff);
  document.getElementById("bestWater").innerText = best(waterEff);

  drawChart("chart_month","月別釣果",monthData);
  drawChart("chart_river","河川別釣果",riverData);
  drawChart("chart_point","ポイント別釣果",pointData);

  showLatest(data);
});
}

function drawChart(id,title,obj){
  let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  let dataArr=[[title,"値"]];
  arr.forEach(v=>dataArr.push([v[0],v[1]]));
  let data=google.visualization.arrayToDataTable(dataArr);
  let chart=new google.visualization.ColumnChart(document.getElementById(id));
  chart.draw(data,{
    title:title,
    titleTextStyle:{color:"#7fffd4"},
    backgroundColor:"transparent",
    legend:{textStyle:{color:"white"}},
    hAxis:{textStyle:{color:"white"}},
    vAxis:{textStyle:{color:"white"}}
  });
}

function showLatest(data){
  let html="";
  data.slice(-5).reverse().forEach(r=>{
    html+=`<p>${r["日付"]}　${r["河川"]}　${r["匹数"]}匹</p>`;
  });
  document.getElementById("latestFishing").innerHTML=html;
}
</script>
</body>
</html>
