<style>

body{

margin:0;
}

header{
text-align:center;

.container{

}

.title{
text-align:center;
font-size:34px;

color:#6fffe9;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));

}

.card{

.card-title{

}

.section-title{

</style>

<header>

<nav>

<div class="container">

<div class="title">
2026 SEASON SUMMARY
</div>

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div class="card-value">245匹</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>

</div>

<div class="card">

TABOSAN AYU ANALYTICS LAB

</footer>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(drawCharts);

function drawCharts(){

var m=google.visualization.arrayToDataTable([
['月','釣果'],
['6月',20],
['7月',60],
['8月',90],
['9月',55]
]);

new google.visualization.ColumnChart(
document.getElementById('chart_month')
).draw(m,{backgroundColor:'transparent',colors:['#35e3ff']});

var r=google.visualization.arrayToDataTable([
['河川','釣果'],
['長良川',120],
['板取川',80],
['白川',45]
]);

new google.visualization.PieChart(
document.getElementById('chart_river')
).draw(r,{backgroundColor:'transparent'});

}

</script>

</body>
