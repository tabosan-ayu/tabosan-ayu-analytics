<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#0b1620;
color:white;
margin:0;
}

header{
background:#081018;
padding:25px;
font-size:32px;
text-align:center;
font-weight:bold;
}

.container{
width:1200px;
max-width:95%;
margin:auto;
padding:20px;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.summary-card{
background:#13202c;
padding:24px;
border-radius:10px;
text-align:center;
}

.summary-card h3{
margin:0 0 10px 0;
font-size:18px;
color:#9ecbff;
}

.summary-card p{
margin:0;
font-size:30px;
font-weight:bold;
}

.card{
background:#13202c;
padding:30px;
border-radius:10px;
margin-top:20px;
}

.card h2{
margin-top:0;
}

</style>

<script>

google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(initCharts);

const SHEET_ID = "1VW63HjLHVUwC9w6cgnAvt-oV3cItpSSY4a5Ykq2VtXk";

function fetchSheet(name){
return fetch(`https://opensheet.elk.sh/${SHEET_ID}/${name}`)
.then(res=>res.json());
}

function toNumber(v){
return Number(String(v).replace(/,/g,""))||0;
}

function drawColumn(id,title,h1,h2,rows){

const data = google.visualization.arrayToDataTable([[h1,h2],...rows]);

const options={
title:title,
backgroundColor:"#13202c",
titleTextStyle:{color:"white"},
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
};

new google.visualization.ColumnChart(
document.getElementById(id)
).draw(data,options);

}

function drawBar(id,title,h1,h2,rows){

const data = google.visualization.arrayToDataTable([[h1,h2],...rows]);

const options={
title:title,
backgroundColor:"#13202c",
titleTextStyle:{color:"white"},
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
};

new google.visualization.BarChart(
document.getElementById(id)
).draw(data,options);

}

function setText(id,v){
document.getElementById(id).textContent=v;
}

async function initCharts(){

const [
webMonth,
pointRank,
sizeRank,
pointEfficiency,
riverMonth,
rodRank,
today
] = await Promise.all([

fetchSheet("WEB_MONTH"),
fetchSheet("POINT_RANK"),
fetchSheet("SIZE_RANK"),
fetchSheet("POINT_EFFICIENCY"),
fetchSheet("RIVER_MONTH"),
fetchSheet("POINT_ROD"),
fetchSheet("TODAY")

]);

const monthRows = webMonth
.filter(r=>r.月)
.map(r=>[r.月+"月",toNumber(r.匹数)]);

drawColumn("monthChart","月別釣果","月","釣果",monthRows);

const pointRows = pointRank
.filter(r=>r.ポイント)
.slice(0,10)
.map(r=>[r.ポイント,toNumber(r.総釣果||r.匹数)]);

drawBar("pointChart","ポイントランキング","ポイント","匹数",pointRows);

const sizeRows = sizeRank
.filter(r=>r.ポイント||r.河川||r.竿名)
.slice(0,10)
.map(r=>[
r.ポイント||r.河川||r.竿名,
toNumber(r.最大サイズ||r.サイズ)
]);

drawBar("sizeChart","サイズランキング","項目","サイズ",sizeRows);

const efficiencyRows = pointEfficiency
.filter(r=>r.ポイント)
.slice(0,10)
.map(r=>[
r.ポイント,
toNumber(r["平均匹数"])
]);

drawBar("efficiencyChart","効率ランキング","ポイント","平均匹数",efficiencyRows);

const riverRows = riverMonth
.filter(r=>r.河川)
.slice(0,10)
.map(r=>[
r.河川,
toNumber(r.匹数)
]);

drawBar("riverChart","河川ランキング","河川","匹数",riverRows);

const rodRows = rodRank
.filter(r=>r.竿名)
.slice(0,10)
.map(r=>[
r.竿名,
toNumber(r.匹数)
]);

drawBar("rodChart","竿ランキング","竿","匹数",rodRows);

const totalCatch = monthRows.reduce((a,b)=>a+toNumber(b[1]),0);
const trips = today.length;
const avg = trips ? (totalCatch/trips).toFixed(1) : 0;
const max = Math.max(...sizeRows.map(r=>toNumber(r[1])));

setText("totalCatch",totalCatch+"匹");
setText("totalTrips",trips+"回");
setText("avgCatch",avg+"匹");
setText("maxSize",max+"cm");

}

</script>

</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="summary-grid">

<div class="summary-card">
<h3>総釣果</h3>
<p id="totalCatch">-</p>
</div>

<div class="summary-card">
<h3>釣行回数</h3>
<p id="totalTrips">-</p>
</div>

<div class="summary-card">
<h3>平均釣果</h3>
<p id="avgCatch">-</p>
</div>

<div class="summary-card">
<h3>最大サイズ</h3>
<p id="maxSize">-</p>
</div>

</div>

<div class="card">
<h2>月別釣果</h2>
<div id="monthChart" style="height:500px"></div>
</div>

<div class="card">
<h2>ポイントランキング</h2>
<div id="pointChart" style="height:500px"></div>
</div>

<div class="card">
<h2>サイズランキング</h2>
<div id="sizeChart" style="height:500px"></div>
</div>

<div class="card">
<h2>効率ランキング</h2>
<div id="efficiencyChart" style="height:500px"></div>
</div>

<div class="card">
<h2>河川ランキング</h2>
<div id="riverChart" style="height:500px"></div>
</div>

<div class="card">
<h2>竿ランキング</h2>
<div id="rodChart" style="height:500px"></div>
</div>

</div>

</body>
</html>
