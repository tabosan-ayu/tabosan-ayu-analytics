<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#021018,#000a12,#00070d);
color:white;
}

/* HEADER */

header{
background:#061520;
padding:24px;
text-align:center;
font-size:30px;
letter-spacing:4px;
color:#7fffd4;
}

/* MENU */

nav{
position:sticky;
top:0;
z-index:100;
display:flex;
justify-content:center;
gap:60px;
background:#05121a;
padding:12px;
}

nav a{
color:#7fe7d6;
text-decoration:none;
font-size:14px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* TITLE */

.title{
text-align:center;
font-size:40px;
letter-spacing:6px;
color:#6fffe9;
margin-bottom:35px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:35px;
}

.card{
background:#0b2435;
border-radius:12px;
padding:18px;
text-align:center;
box-shadow:0 0 12px rgba(0,255,200,0.25);
}

.card-title{
font-size:14px;
color:#7fffd4;
margin-bottom:8px;
}

.card-value{
font-size:28px;
font-weight:bold;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:35px;
}

.chart-box{
background:#0b2435;
padding:20px;
border-radius:12px;
}

.section-title{
text-align:center;
font-size:18px;
margin-bottom:10px;
color:#7fffd4;
letter-spacing:2px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<nav>
<a href="index.html">HOME</a>
<a href="data.html">DATA</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<div class="title">
2026 SEASON SUMMARY
</div>

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div class="card-value" id="totalCatch">0匹</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div class="card-value" id="tripCount">0回</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div class="card-value" id="avgCatch">0匹</div>
</div>

<div class="card">
<div class="card-title">最大サイズ</div>
<div class="card-value" id="maxSize">0cm</div>
</div>

<div class="card">
<div class="card-title">河川数</div>
<div class="card-value" id="riverCount">0</div>
</div>

</div>

<div class="grid">

<div class="chart-box">
<div class="section-title">MONTHLY CATCH</div>
<div id="chart_month" style="height:300px"></div>
</div>

<div class="chart-box">
<div class="section-title">RIVER CATCH</div>
<div id="chart_river" style="height:300px"></div>
</div>

</div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTZhvDGwcXLjhciH5hLlnYGPzmNmUxmXySU9X-WsppJv8cmewEAO08bS0vGtwkP_5zofepEj12Ix6ZI/pub?output=csv";

google.charts.load('current',{packages:['corechart']});

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.split("\n").slice(1);

let total=0;
let trips=0;
let max=0;

let monthData={};
let riverData={};

rows.forEach(r=>{

const c=r.split(",");

const date=c[0];
const river=c[1];
const catchNum=parseInt(c[4]);
const size=parseInt(c[5]);

if(!isNaN(catchNum)){

total+=catchNum;
trips++;

const month=date.split("/")[1];

if(!monthData[month])monthData[month]=0;
monthData[month]+=catchNum;

if(!riverData[river])riverData[river]=0;
riverData[river]+=catchNum;

}

if(size>max)max=size;

});

document.getElementById("totalCatch").innerText=total+"匹";
document.getElementById("tripCount").innerText=trips+"回";
document.getElementById("avgCatch").innerText=Math.round(total/trips)+"匹";
document.getElementById("maxSize").innerText=max+"cm";
document.getElementById("riverCount").innerText=Object.keys(riverData).length;

drawCharts(monthData,riverData);

});

function drawCharts(monthData,riverData){

const m=[["月","釣果"]];

for(let k in monthData){
m.push([k+"月",monthData[k]]);
}

const r=[["河川","釣果"]];

for(let k in riverData){
r.push([k,riverData[k]]);
}

const chart1=new google.visualization.ColumnChart(document.getElementById("chart_month"));
chart1.draw(google.visualization.arrayToDataTable(m),{backgroundColor:"transparent",legend:{textStyle:{color:"white"}}});

const chart2=new google.visualization.PieChart(document.getElementById("chart_river"));
chart2.draw(google.visualization.arrayToDataTable(r),{backgroundColor:"transparent",legend:{textStyle:{color:"white"}}});

}

</script>

</body>
</html>
```
