<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(160deg,#06121c,#02080f);
color:white;
}

/* メニュー */

.topbar{
display:flex;
justify-content:center;
gap:100px;
padding:25px;
background:#081a28;
box-shadow:0 0 30px rgba(0,255,200,0.15);
}

.topbar a{
color:#9fe3ff;
text-decoration:none;
font-size:26px;
letter-spacing:2px;
}

.topbar a:hover{
color:#33ffd2;
}

/* タイトル */

.title{
text-align:center;
font-size:44px;
margin-top:40px;
margin-bottom:40px;
color:#7fffd4;
letter-spacing:3px;
}

/* カード */

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:60px;
max-width:1500px;
margin:auto;
padding:20px;
}

.stat{
background:#0d2234;
padding:35px 25px;
border-radius:18px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,200,0.08);
transition:0.3s;
}

.stat:hover{
transform:translateY(-6px);
box-shadow:0 0 45px rgba(0,255,200,0.35);
}

.stat h3{
margin:0;
font-size:20px;
color:#7fffd4;
}

.stat p{
margin:15px 0 0 0;
font-size:52px;
font-weight:bold;
}

/* グラフ */

.chartbox{
max-width:1500px;
margin:60px auto;
background:#0d2234;
border-radius:20px;
padding:40px;
box-shadow:0 0 35px rgba(0,255,200,0.1);
}

.charttitle{
text-align:center;
font-size:24px;
color:#7fffd4;
margin-bottom:20px;
}

height:200px !i
