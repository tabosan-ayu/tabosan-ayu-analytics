<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#071826,#020b14);
color:white;
}

/* 上メニュー */

.topbar{
display:flex;
justify-content:center;
gap:60px;
padding:22px;
background:#0d2235;
box-shadow:0 0 20px rgba(0,255,170,0.2);
}

.topbar a{
color:#66ffcc;
text-decoration:none;
font-size:24px;
letter-spacing:2px;
}

.topbar a:hover{
color:#33ff99;
}

/* タイトル */

.title{
text-align:center;
font-size:36px;
margin-top:40px;
margin-bottom:40px;
color:#33ff99;
letter-spacing:2px;
}

/* カード */

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:40px;
max-width:1200px;
margin:auto;
padding:20px;
}

.stat{
background:#0f2538;
padding:20px 30px;
