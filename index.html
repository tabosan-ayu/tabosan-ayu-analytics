<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:#021018;
color:white;
margin:0;
}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:30px;
color:#7fffd4;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b2435;
padding:20px;
border-radius:10px;
text-align:center;
}

.card-title{
color:#7fffd4;
}

.card-value{
font-size:28px;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="cards">

<div class="card">
<div class="card-title">総釣果</div>
<div id="totalCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">釣行回数</div>
<div id="tripCount" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均釣果</div>
<div id="avgCatch" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">平均効率</div>
<div id="avgEff" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">最大サイズ</div>
<div id="maxSize" class="card-value">-</div>
</div>

</div>

<div class="grid">

<div id="chart_month" class="chart" style="height:300px"></div>
<div id="chart_point" class="chart" style="height:300px"></div>
<div id="chart_size" class="chart" style="height:300px"></div>
<div id="chart_time" class="chart" style="height:300px"></div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data = data.filter(r => r["匹数"]);

let totalCatch=0;
let tripCount=data.length;
let maxSize=0;
let effTotal=0;

let monthData={};
let pointData={};
let sizeData={};
let timeData={};

data.forEach(row=>{

let catchNum=Number(row["匹数"])||0;
totalCatch+=catchNum;

let size=Number(row["最大サイズ"])||0;
if(size>maxSize) maxSize=size;

let eff=Number(row["効率"])||0;
effTotal+=eff;

let month=row["月"];
monthData[month]=(monthData[month]||0)+catchNum;

let point=row["ポイント"];
pointData[point]=(pointData[point]||0)+catchNum;

let s=Math.floor(size);
sizeData[s]=(sizeData[s]||0)+1;

let time=row["釣行時間"];
timeData[time]=(timeData[time]||0)+catchNum;

});

let avgCatch=(totalCatch/tripCount||0).toFixed(1);
let avgEff=(effTotal/tripCount||0).toFixed(2);

document.getElementById("totalCatch").innerText=totalCatch+"匹";
document.getElementById("tripCount").innerText=tripCount+"回";
document.getElementById("avgCatch").innerText=avgCatch+"匹";
document.getElementById("avgEff").innerText=avgEff+"匹/h";
document.getElementById("maxSize").innerText=maxSize+"cm";

drawChart("chart_month","月","釣果",monthData);
drawChart("chart_point","ポイント","釣果",pointData);
drawChart("chart_size","サイズ","匹",sizeData);
drawChart("chart_time","釣行時間","釣果",timeData);

});

}

function drawChart(id,xlabel,ylabel,obj){

let arr=[[xlabel,ylabel]];

Object.keys(obj).forEach(k=>{
arr.push([k,obj[k]]);
});

let data=google.visualization.arrayToDataTable(arr);

let chart=new google.visualization.ColumnChart(
document.getElementById(id)
);

chart.draw(data,{
backgroundColor:"transparent",
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
});

}

</script>

</body>
</html>
