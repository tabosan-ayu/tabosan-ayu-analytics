<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b1620;
  color:white;
  margin:0;
}

header{
  background:#081018;
  padding:25px;
  font-size:32px;
  text-align:center;
  font-weight:bold;
}

.container{
  width:1200px;
  max-width:95%;
  margin:auto;
  padding:20px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

.summary-card{
  background:#13202c;
  padding:24px;
  border-radius:10px;
  text-align:center;
}

.summary-card h3{
  margin:0 0 10px 0;
  font-size:18px;
  color:#9ecbff;
}

.summary-card p{
  margin:0;
  font-size:30px;
  font-weight:bold;
}

.card{
  background:#13202c;
  padding:30px;
  border-radius:10px;
  margin-top:20px;
}

.card h2{
  margin-top:0;
}

@media (max-width:768px){
  header{
    font-size:24px;
    padding:18px;
  }
  .card{
    padding:18px;
  }
}
</style>

<script>
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(initCharts);

const SHEET_ID = '1VW63HjLHVUwC9w6cgnAvt-oV3cItpSSY4a5Ykq2VtXk';

function fetchSheet(sheetName){
  return fetch(`https://opensheet.elk.sh/${SHEET_ID}/${sheetName}`)
    .then(res => res.json());
}

function toNumber(value){
  return Number(String(value).replace(/,/g,'').trim()) || 0;
}

function drawColumnChart(elementId, title, header1, header2, rows){
  const chartData = [[header1, header2], ...rows];
  const dataTable = google.visualization.arrayToDataTable(chartData);

  const options = {
    title:title,
    backgroundColor:'#13202c',
    titleTextStyle:{color:'white'},
    legend:{textStyle:{color:'white'}},
    hAxis:{textStyle:{color:'white'}},
    vAxis:{textStyle:{color:'white'}},
    chartArea:{width:'80%',height:'70%'}
  };

  const chart = new google.visualization.ColumnChart(document.getElementById(elementId));
  chart.draw(dataTable, options);
}

function drawBarChart(elementId, title, header1, header2, rows){
  const chartData = [[header1, header2], ...rows];
  const dataTable = google.visualization.arrayToDataTable(chartData);

  const options = {
    title:title,
    backgroundColor:'#13202c',
    titleTextStyle:{color:'white'},
    legend:{textStyle:{color:'white'}},
    hAxis:{textStyle:{color:'white'}},
    vAxis:{textStyle:{color:'white'}},
    chartArea:{width:'70%',height:'70%'}
  };

  const chart = new google.visualization.BarChart(document.getElementById(elementId));
  chart.draw(dataTable, options);
}

function setText(id, value){
  document.getElementById(id).textContent = value;
}

async function initCharts(){
  try{
    const [
      webMonth,
      pointRank,
      sizeRank,
      pointEfficiency,
      today
    ] = await Promise.all([
      fetchSheet('WEB_MONTH'),
      fetchSheet('POINT_RANK'),
      fetchSheet('SIZE_RANK'),
      fetchSheet('POINT_EFFICIENCY'),
      fetchSheet('TODAY')
    ]);

    const monthRows = webMonth
      .filter(row => row.月)
      .map(row => [row.月 + '月', toNumber(row.匹数)]);

    drawColumnChart('monthChart', '月別釣果', '月', '釣果', monthRows);

    const pointRows = pointRank
      .filter(row => row.ポイント)
      .slice(0, 10)
      .map(row => [row.ポイント, toNumber(row.総釣果 || row.匹数 || row.釣果)]);

    drawBarChart('pointChart', 'ポイントランキング', 'ポイント', '匹数', pointRows);

    const sizeRows = sizeRank
      .filter(row => row.ポイント || row.河川 || row.竿名)
      .slice(0, 10)
      .map(row => [
        row.ポイント || row.河川 || row.竿名,
        toNumber(row.最大サイズ || row.サイズ)
      ]);

    drawBarChart('sizeChart', 'サイズランキング', '項目', '最大サイズ', sizeRows);

    const efficiencyRows = pointEfficiency
      .filter(row => row.ポイント)
      .slice(0, 10)
      .map(row => [
        row.ポイント,
        toNumber(row['平均匹数'])
      ]);

    drawBarChart('efficiencyChart', '効率ランキング', 'ポイント', '効率', efficiencyRows);

    const totalCatch = monthRows.reduce((sum, row) => sum + toNumber(row[1]), 0);
    const totalTrips = today.length;
    const maxSize = sizeRows.length ? Math.max(...sizeRows.map(r => toNumber(r[1]))) : 0;
    const avgCatch = totalTrips ? (totalCatch / totalTrips).toFixed(1) : 0;

    setText('totalCatch', totalCatch + '匹');
    setText('totalTrips', totalTrips + '回');
    setText('avgCatch', avgCatch + '匹');
    setText('maxSize', maxSize + 'cm');

  }catch(error){
    console.error(error);
    document.getElementById('errorMessage').textContent = 'データの読み込みでエラーが出ました。';
  }
}
</script>

</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="summary-grid">
  <div class="summary-card">
    <h3>総釣果</h3>
    <p id="totalCatch">-</p>
  </div>
  <div class="summary-card">
    <h3>釣行回数</h3>
    <p id="totalTrips">-</p>
  </div>
  <div class="summary-card">
    <h3>平均釣果</h3>
    <p id="avgCatch">-</p>
  </div>
  <div class="summary-card">
    <h3>最大サイズ</h3>
    <p id="maxSize">-</p>
  </div>
</div>

<div class="card">
  <h2>月別釣果</h2>
  <div id="monthChart" style="width:100%;height:500px;"></div>
</div>

<div class="card">
  <h2>ポイントランキング</h2>
  <div id="pointChart" style="width:100%;height:500px;"></div>
</div>

<div class="card">
  <h2>サイズランキング</h2>
  <div id="sizeChart" style="width:100%;height:500px;"></div>
</div>

<div class="card">
  <h2>効率ランキング</h2>
  <div id="efficiencyChart" style="width:100%;height:500px;"></div>
</div>

<div id="errorMessage" style="color:#ff8080; padding:20px 0;"></div>

</div>

</body>
</html>
