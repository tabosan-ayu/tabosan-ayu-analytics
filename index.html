<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
background:#0b1620;
color:white;
margin:0;
}

header{
background:#081018;
padding:25px;
font-size:32px;
text-align:center;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
padding:25px;
}

.card{
background:#0f1c2a;
padding:20px;
border-radius:10px;
}

.chart{
height:350px;
}

</style>
</head>

<body>

<header>
TABOSAN AYU ANALYTICS LAB
</header>

<div class="container">

<div class="card">
<h3>月別釣果</h3>
<div id="month_chart" class="chart"></div>
</div>

<div class="card">
<h3>河川ランキング</h3>
<div id="river_chart" class="chart"></div>
</div>

<div class="card">
<h3>竿ランキング</h3>
<div id="rod_chart" class="chart"></div>
</div>

<div class="card">
<h3>水位ランキング</h3>
<div id="water_chart" class="chart"></div>
</div>

<div class="card">
<h3>天候ランキング</h3>
<div id="weather_chart" class="chart"></div>
</div>

</div>

<script>

google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(drawCharts);

function drawCharts(){

drawMonth();
drawRiver();
drawRod();
drawWater();
drawWeather();

}

function drawMonth(){

var data = google.visualization.arrayToDataTable([
['月','匹数'],
['6月',22],
['7月',0],
['8月',0]
]);

var options = {
backgroundColor:'#0f1c2a',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
titleTextStyle:{color:'white'}
};

var chart = new google.visualization.ColumnChart(document.getElementById('month_chart'));
chart.draw(data,options);

}

function drawRiver(){

var data = google.visualization.arrayToDataTable([
['河川','匹数'],
['長良川',22]
]);

var options = {
backgroundColor:'#0f1c2a',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
titleTextStyle:{color:'white'}
};

var chart = new google.visualization.BarChart(document.getElementById('river_chart'));
chart.draw(data,options);

}

function drawRod(){

var data = google.visualization.arrayToDataTable([
['竿','匹数'],
['TF',10],
['AD',7],
['FW',5]
]);

var options = {
backgroundColor:'#0f1c2a',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
titleTextStyle:{color:'white'}
};

var chart = new google.visualization.BarChart(document.getElementById('rod_chart'));
chart.draw(data,options);

}

function drawWater(){

var data = google.visualization.arrayToDataTable([
['水位','匹数'],
['平水',22]
]);

var options = {
backgroundColor:'#0f1c2a',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
titleTextStyle:{color:'white'}
};

var chart = new google.visualization.BarChart(document.getElementById('water_chart'));
chart.draw(data,options);

}

function drawWeather(){

var data = google.visualization.arrayToDataTable([
['天候','匹数'],
['晴',22]
]);

var options = {
backgroundColor:'#0f1c2a',
legend:{textStyle:{color:'white'}},
hAxis:{textStyle:{color:'white'}},
vAxis:{textStyle:{color:'white'}},
titleTextStyle:{color:'white'}
};

var chart = new google.visualization.BarChart(document.getElementById('weather_chart'));
chart.draw(data,options);

}

</script>

</body>
</html>
