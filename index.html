<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(160deg,#06121c,#02080f);
color:white;
}

/* メニュー */

.topbar{
display:flex;
justify-content:center;
gap:80px;
padding:22px;
background:#081a28;
box-shadow:0 0 30px rgba(0,255,200,0.15);
}

.topbar a{
color:#9fe3ff;
text-decoration:none;
font-size:24px;
letter-spacing:2px;
}

.topbar a:hover{
color:#33ffd2;
}

/* タイトル */

.title{
text-align:center;
font-size:42px;
margin-top:40px;
margin-bottom:40px;
color:#7fffd4;
letter-spacing:3px;
}

/* カード */

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:45px;
max-width:1300px;
margin:auto;
padding:20px;
}

.stat{
background:#0d2234;
padding:25px 30px;
border-radius:14px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,200,0.08);
transition:0.3s;
}

.stat:hover{
transform:translateY(-6px);
box-shadow:0 0 35px rgba(0,255,200,0.25);
}

.stat h3{
margin:0;
font-size:18px;
color:#7fffd4;
}

.stat p{
margin:10px 0 0 0;
font-size:40px;
font-weight:bold;
}

/* グラフカード */

.chartbox{
max-width:1300px;
margin:50px auto;
background:#0d2234;
border-radius:18px;
padding:35px;
box-shadow:0 0 30px rgba(0,255,200,0.1);
}

.charttitle{
text-align:center;
font-size:20px;
color:#7fffd4;
margin-bottom:20px;
}

canvas{
height:220px !important;
}

</style>

</head>

<body>

</div>
