<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>INDEX</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}

.container{max-width:1500px;margin:auto;padding:30px;}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#0b2435;
padding:20px;
border-radius:12px;
text-align:center;
}

.card-title{color:#7fffd4;}
.card-value{font-size:28px;font-weight:bold;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
width:100%;
box-sizing:border-box;
}

.latest{
background:#0b2435;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="common"></div>

<div class="container">

<div class="cards">
<div class="card"><div class="card-title">総釣果</div><div id="totalCatch" class="card-value">-</div></div>
<div class="card"><div class="card-title">釣行回数</div><div id="tripCount" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均釣果</div><div id="avgCatch" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均効率</div><div id="avgEff" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均サイズ</div><div id="avgSize" class="card-value">-</div></div>
</div>

<div class="grid">
<div id="chart1" class="chart"></div>
<div id="chart2" class="chart"></div>
</div>

</div>

<script>

// 共通ナビ
fetch("common.test.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("common").innerHTML=data;

document.querySelectorAll("nav a").forEach(link=>{
if(location.href.includes(link.getAttribute("href"))){
link.classList.add("active");
}
});
});

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(draw);

function draw(){

let data=google.visualization.arrayToDataTable([
["月","匹"],
["6",50],
["7",80]
]);

let chart=new google.visualization.ColumnChart(document.getElementById("chart1"));

chart.draw(data,getOptions("月別釣果"));

}

// 🔥共通設定（最重要）
function getOptions(title){
return{
title:title,
titleTextStyle:{color:"#7fffd4"},
backgroundColor:"transparent",

chartArea:{
left:50,
top:50,
width:"65%",
height:"65%"
},

legend:{
position:"top",
alignment:"end",
textStyle:{color:"#7fffd4",fontSize:14}
},

hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}}
};
}

</script>

</body>
</html>
