<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU ANALYTICS LAB</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}

/* ===== ヘッダー ===== */
header{
background:#041822;
padding:25px;
text-align:center;
font-size:40px;
color:#7fffd4;
}

nav{
text-align:center;
background:#041822;
padding:12px 0;
}

nav a{
color:white;
margin:0 18px;
text-decoration:none;
font-weight:bold;
font-size:20px;
}

nav a.active{
color:#7fffd4;
}

.container{
max-width:1500px;
margin:auto;
padding:30px;
}

/* ===== カード ===== */
.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:22px;
margin-bottom:35px;
}

.card{
background:#0b2435;
padding:22px;
border-radius:12px;
text-align:center;
}

.card-title{
color:#7fffd4;
font-size:18px;
}

.card-value{
font-size:28px;
font-weight:bold;
}

/* ===== グリッド ===== */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px;
}

.chart{
background:#0b2435;
padding:22px;
border-radius:12px;
height:340px;
}

/* ===== 最近の釣果（←変更） ===== */
.latest{
background:#0b2435;
padding:22px;
border-radius:12px;
}

.latest h3{
font-size:26px; /* ←変更 */
color:#7fffd4;
}

.latest p{
font-size:22px; /* ←変更 */
margin:6px 0;
}
</style>
</head>

<body>

<header>TABOSAN AYU ANALYTICS LAB</header>

<nav>
<a href="index.html" class="active">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<div class="cards">
<div class="card"><div class="card-title">総釣果</div><div id="totalCatch" class="card-value">-</div></div>
<div class="card"><div class="card-title">釣行回数</div><div id="tripCount" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均釣果</div><div id="avgCatch" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均効率</div><div id="avgEff" class="card-value">-</div></div>
<div class="card"><div class="card-title">平均サイズ</div><div id="avgSize" class="card-value">-</div></div>
</div>

<div class="grid">

<div id="chart_month_total" class="chart"></div>
<div id="chart_river" class="chart"></div>

<div id="chart_month_trip" class="chart"></div>
<div id="chart_month_avgCatch" class="chart"></div>

<div id="chart_month_avgEff" class="chart"></div>
<div id="chart_month_avgSize" class="chart"></div>

<div id="chart_rod" class="chart"></div>

<div class="latest">
<h3>最近の釣果</h3>
<div id="latestFishing"></div>
</div>

</div>
</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL="https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){
fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data=data.filter(r=>r["匹数"])

let totalCatch=0, tripCount=data.length, effTotal=0, sizeTotal=0

let monthTotal={}, monthTrip={}, monthCatch={}, monthEff={}, monthSize={}
let riverData={}, rodData={}

data.forEach(r=>{
let month=r["月"]
let catchNum=Number(r["匹数"])||0
let eff=Number(r["効率"])||0
let size=Number(r["平均サイズ"])||0
let river=r["河川"]
let rod=r["竿名"]

totalCatch+=catchNum
effTotal+=eff
sizeTotal+=size

monthTotal[month]=(monthTotal[month]||0)+catchNum
monthTrip[month]=(monthTrip[month]||0)+1
monthCatch[month]=(monthCatch[month]||0)+catchNum
monthEff[month]=(monthEff[month]||0)+eff
monthSize[month]=(monthSize[month]||0)+size

riverData[river]=(riverData[river]||0)+catchNum
rodData[rod]=(rodData[rod]||0)+1
})

let avgCatchMonth={}, avgEffMonth={}, avgSizeMonth={}

Object.keys(monthTrip).forEach(m=>{
avgCatchMonth[m]=monthCatch[m]/monthTrip[m]
avgEffMonth[m]=monthEff[m]/monthTrip[m]
avgSizeMonth[m]=monthSize[m]/monthTrip[m]
})

document.getElementById("totalCatch").innerText=totalCatch+"匹"
document.getElementById("tripCount").innerText=tripCount+"回"
document.getElementById("avgCatch").innerText=(totalCatch/tripCount).toFixed(1)+"匹"
document.getElementById("avgEff").innerText=(effTotal/tripCount).toFixed(2)+"匹/h"
document.getElementById("avgSize").innerText=(sizeTotal/tripCount).toFixed(1)+"cm"

drawChart("chart_month_total","月別釣果",monthTotal,"匹")
drawChart("chart_month_trip","月別釣行回数",monthTrip,"回")
drawChart("chart_month_avgCatch","月別平均釣果",avgCatchMonth,"匹")
drawChart("chart_month_avgEff","月別平均効率",avgEffMonth,"匹/h")
drawChart("chart_month_avgSize","月別平均サイズ",avgSizeMonth,"cm")

drawPie("chart_river","河川割合",riverData)
drawPie("chart_rod","竿使用回数",rodData)

showLatest(data)

})
}

function drawChart(id,title,obj,unit){
let arr=Object.entries(obj)
arr.sort((a,b)=>a[0]-b[0])

let dataArr=[[title,unit]]
arr.forEach(v=>dataArr.push([v[0],v[1]]))

let data=google.visualization.arrayToDataTable(dataArr)

let chart=new google.visualization.ColumnChart(document.getElementById(id))

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4",fontSize:18,bold:true},
backgroundColor:"transparent",
legend:{
legend:{
  position:"top",
  textStyle:{color:"#7fffd4", fontSize:14}
},
hAxis:{textStyle:{color:"white", fontSize:14}},
vAxis:{textStyle:{color:"white"}, title:unit}
})
}

function drawPie(id,title,obj){
let dataArr=[[title,"割合"]]
Object.entries(obj).forEach(v=>dataArr.push(v))

let data=google.visualization.arrayToDataTable(dataArr)

let chart=new google.visualization.PieChart(document.getElementById(id))

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4",fontSize:18,bold:true},
backgroundColor:"transparent",
legend:{
textStyle:{color:"#7fffd4", fontSize:14}
}
})
}

function showLatest(data){
let html=""
data.slice(-5).reverse().forEach(r=>{
html+=`<p>${r["日付"]}　${r["河川"]}　${r["匹数"]}匹</p>`
})
document.getElementById("latestFishing").innerHTML=html
}

</script>

</body>
</html>
