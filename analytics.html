<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU EFFICIENCY</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{
  font-family: Arial;
  background: #021018;
  color: white;
  margin: 0;
}

header{
  background: #041822;
  padding: 25px;
  text-align: center;
  font-size: 32px;
  color: #7fffd4;
}

.container{
  width: 90%;
  margin: auto;
  padding: 30px 0;
}

.grid{
  display: flex;
  flex-wrap: nowrap;
  gap: 25px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.chart{
  background: #0b2435;
  padding: 20px;
  border-radius: 10px;
  min-width: 300px;
  flex: 0 0 auto;
  height: 320px;
}
</style>
</head>
<body>

<header>
TABOSAN AYU EFFICIENCY
</header>

<div class="container">
  <div class="grid">
    <div id="chart_eff_river" class="chart"></div>
    <div id="chart_eff_point" class="chart"></div>
    <div id="chart_eff_rod" class="chart"></div>
    <div id="chart_eff_weather" class="chart"></div>
    <div id="chart_eff_water" class="chart"></div>
  </div>
</div>

<script>
google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL = "https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){
  fetch(sheetURL).then(res=>res.json()).then(data=>{
    data = data.filter(r=>r["効率"]);
    
    let riverData={}, pointData={}, rodData={}, weatherData={}, waterData={};

    data.forEach(r=>{
      let eff = Number(r["効率"])||0;
      riverData[r["河川"]] = Math.max(riverData[r["河川"]]||0, eff);
      pointData[r["ポイント"]] = Math.max(pointData[r["ポイント"]]||0, eff);
      rodData[r["竿名"]] = Math.max(rodData[r["竿名"]]||0, eff);
      weatherData[r["天候"]] = Math.max(weatherData[r["天候"]]||0, eff);
      waterData[r["水位"]] = Math.max(waterData[r["水位"]]||0, eff);
    });

    drawChart("chart_eff_river","河川効率ランキング",riverData);
    drawChart("chart_eff_point","ポイント効率ランキング",pointData);
    drawChart("chart_eff_rod","竿効率ランキング",rodData);
    drawChart("chart_eff_weather","天候効率ランキング",weatherData);
    drawChart("chart_eff_water","水位効率ランキング",waterData);
  });
}

function drawChart(id,title,obj){
  let arr = Object.entries(obj);
  arr.sort((a,b)=>b[1]-a[1]);
  let dataArr = [[title,"効率"]];
  arr.forEach(v=>dataArr.push([v[0],v[1]]));
  let data = google.visualization.arrayToDataTable(dataArr);
  let chart = new google.visualization.ColumnChart(document.getElementById(id));
  chart.draw(data,{
    title:title,
    titleTextStyle:{color:"#7fffd4"},
    backgroundColor:"transparent",
    legend:{textStyle:{color:"white"}},
    hAxis:{textStyle:{color:"white"}},
    vAxis:{textStyle:{color:"white"}}
  });
}
</script>

</body>
</html>
