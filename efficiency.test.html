<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU EFFICIENCY</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:30px;
color:#7fffd4;
}

nav{
text-align:center;
padding:15px;
background:#03151f;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
padding:6px 12px;
border-radius:6px;
}

nav a.active{
background:#0b2435;
color:#7fffd4;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
}
</style>
</head>

<body>

<div id="common"></div>

<script>
fetch("common.test.html")
.then(res => res.text())
.then(data => {
document.getElementById("common").innerHTML = data;

// active自動化
const links = document.querySelectorAll("nav a");
const current = location.pathname.split("/").pop();

links.forEach(link => {
if(link.getAttribute("href") === current){
link.classList.add("active");
}
});
});
</script>

<div class="container">

<div class="grid">

<div id="riverEff" class="chart"></div>
<div id="pointEff" class="chart"></div>

<div id="weatherEff" class="chart"></div>
<div id="waterEff" class="chart"></div>

<div id="weatherWaterEff" class="chart"></div>
<div id="riverWaterEff" class="chart"></div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

data=data.filter(r=>r["効率"])

let river={}, point={}, weather={}, water={}
let rc={}, pc={}, wc={}, wc2={}

let weatherWater={}, wwCount={}
let riverWater={}, rwCount={}

data.forEach(r=>{

let eff = Number(r["効率"]) || 0

let riverName=r["河川"]
let pointName=r["ポイント"]
let weatherName=r["天候"]
let waterName=r["水位"]

river[riverName]=(river[riverName]||0)+eff
rc[riverName]=(rc[riverName]||0)+1

point[pointName]=(point[pointName]||0)+eff
pc[pointName]=(pc[pointName]||0)+1

weather[weatherName]=(weather[weatherName]||0)+eff
wc[weatherName]=(wc[weatherName]||0)+1

water[waterName]=(water[waterName]||0)+eff
wc2[waterName]=(wc2[waterName]||0)+1

let wwKey = weatherName + "×" + waterName
weatherWater[wwKey]=(weatherWater[wwKey]||0)+eff
wwCount[wwKey]=(wwCount[wwKey]||0)+1

let rwKey = riverName + "×" + waterName
riverWater[rwKey]=(riverWater[rwKey]||0)+eff
rwCount[rwKey]=(rwCount[rwKey]||0)+1

})

avg(river,rc)
avg(point,pc)
avg(weather,wc)
avg(water,wc2)
avg(weatherWater,wwCount)
avg(riverWater,rwCount)

draw("riverEff","河川効率",river)
draw("pointEff","ポイント効率",point)
draw("weatherEff","天候効率",weather)
draw("waterEff","水位効率",water)

draw("weatherWaterEff","天候×水位効率",weatherWater)
draw("riverWaterEff","河川×水位効率",riverWater)

})

}

function avg(obj,count){
for(let k in obj){
obj[k]=obj[k]/count[k]
}
}

function draw(id,title,obj){

let arr=Object.entries(obj)
arr.sort((a,b)=>b[1]-a[1])

let dataArr=[[title,"匹/h"]]

arr.slice(0,10).forEach(v=>{
dataArr.push([v[0],Number(v[1].toFixed(2))])
})

let data=google.visualization.arrayToDataTable(dataArr)

let chart=new google.visualization.ColumnChart(
document.getElementById(id)
)

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4"},
backgroundColor:"transparent",
legend:{textStyle:{color:"white"}},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"},title:"匹/h"}
})

}

</script>

</body>
</html>
