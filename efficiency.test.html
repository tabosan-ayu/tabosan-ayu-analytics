<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU EFFICIENCY</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:32px;
color:#7fffd4;
}

nav{
text-align:center;
background:#041822;
padding:10px 0;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a.active{color:#7fffd4;}

.container{
max-width:1500px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
}
</style>
</head>

<body>

<header>TABOSAN AYU EFFICIENCY</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html" class="active">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">
<div class="grid">

<div id="chart_eff_river" class="chart"></div>
<div id="chart_eff_point" class="chart"></div>

<div id="chart_eff_weather" class="chart"></div>
<div id="chart_eff_water" class="chart"></div>

<div id="chart_eff_rod" class="chart"></div>
<div id="chart_eff_month" class="chart"></div>

</div>
</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL="https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

// ===== 0消さない =====
data = data.filter(r => r["匹数"] !== "" && r["匹数"] != null)

// ===== 格納 =====
let river={}, point={}, weather={}, water={}, rod={}, month={}

data.forEach(r=>{

let eff = parseFloat(r["効率"]) || 0

let riverKey = r["河川"] ?? "不明"
let pointKey = r["ポイント"] ?? "不明"
let weatherKey = r["天候"] ?? "不明"
let waterKey = r["水位"] ?? "不明"
let rodKey = r["竿"] ?? r["竿名"] ?? "不明"
let monthKey = r["月"] ?? "0"

// 平均計算用
addData(river, riverKey, eff)
addData(point, pointKey, eff)
addData(weather, weatherKey, eff)
addData(water, waterKey, eff)
addData(rod, rodKey, eff)
addData(month, monthKey, eff)

})

// ===== 平均化 =====
let riverAvg = calcAvg(river)
let pointAvg = calcAvg(point)
let weatherAvg = calcAvg(weather)
let waterAvg = calcAvg(water)
let rodAvg = calcAvg(rod)
let monthAvg = calcAvg(month)

// ===== 描画 =====
drawChart("chart_eff_river","河川別効率",riverAvg)
drawChart("chart_eff_point","ポイント別効率",pointAvg)
drawChart("chart_eff_weather","天候別効率",weatherAvg)
drawChart("chart_eff_water","水位別効率",waterAvg)
drawChart("chart_eff_rod","竿別効率",rodAvg)
drawChart("chart_eff_month","月別効率",monthAvg,true)

})
.catch(err=>{
alert("データ取得失敗")
console.error(err)
})

}

// ===== データ加算 =====
function addData(obj,key,val){
if(!obj[key]) obj[key]={sum:0,count:0}
obj[key].sum += val
obj[key].count++
}

// ===== 平均化 =====
function calcAvg(obj){
let result={}
Object.entries(obj).forEach(([k,v])=>{
result[k]= v.count ? v.sum/v.count : 0
})
return result
}

// ===== グラフ =====
function drawChart(id,title,obj,isMonth=false){

let arr=Object.entries(obj)

// 月だけ昇順、それ以外はランキング
if(isMonth){
arr.sort((a,b)=>Number(a[0]) - Number(b[0]))
}else{
arr.sort((a,b)=>b[1]-a[1])
}

if(arr.length===0) return

let dataArr=[[title,"匹/h"]]
arr.forEach(v=>dataArr.push([v[0],v[1]]))

let data=google.visualization.arrayToDataTable(dataArr)
let chart=new google.visualization.ColumnChart(document.getElementById(id))

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4", fontSize:16, bold:true},
backgroundColor:"transparent",
legend:{
position:"top",
alignment:"end",
textStyle:{color:"#7fffd4", fontSize:13}
},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"}, title:"匹/h"}
})

}

</script>

</body>
</html>
