<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TABOSAN AYU EFFICIENCY</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{font-family:Arial;background:#021018;color:white;margin:0;}

header{
background:#041822;
padding:25px;
text-align:center;
font-size:30px;
color:#7fffd4;
}

nav{
text-align:center;
padding:15px;
background:#03151f;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
padding:6px 12px;
border-radius:6px;
}

nav a.active{
background:#0b2435;
color:#7fffd4;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart{
background:#0b2435;
padding:20px;
border-radius:10px;
height:320px;
}
</style>
</head>

<body>

<header>TABOSAN AYU EFFICIENCY</header>

<nav>
<a href="index.html">HOME</a>
<a href="ranking.html">RANKING</a>
<a href="efficiency.html" class="active">EFFICIENCY</a>
<a href="photo.html">PHOTO</a>
</nav>

<div class="container">

<div class="grid">

<div id="riverEff" class="chart"></div>
<div id="pointEff" class="chart"></div>

<div id="weatherEff" class="chart"></div>
<div id="waterEff" class="chart"></div>

<div id="weatherWaterEff" class="chart"></div>
<div id="riverWaterEff" class="chart"></div>

</div>

</div>

<script>

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetURL =
"https://opensheet.elk.sh/13W9RPYH2eR9EhikRsV0z3kMGJlYg5ou39708JWy4IX8/DATA";

function loadData(){

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

// 空データ除外（0は残す）
data=data.filter(r=>r["効率"] !== "" && r["効率"] != null)

let river={}, point={}, weather={}, water={}
let rc={}, pc={}, wc={}, wc2={}

let weatherWater={}, wwCount={}
let riverWater={}, rwCount={}

data.forEach(r=>{

let eff = Number(r["効率"]) || 0

let riverName=r["河川"] || "不明"
let pointName=r["ポイント"] || "不明"
let weatherName=r["天候"] || "不明"
let waterName=r["水位"] || "不明"

// 単体
river[riverName]=(river[riverName]||0)+eff
rc[riverName]=(rc[riverName]||0)+1

point[pointName]=(point[pointName]||0)+eff
pc[pointName]=(pc[pointName]||0)+1

weather[weatherName]=(weather[weatherName]||0)+eff
wc[weatherName]=(wc[weatherName]||0)+1

water[waterName]=(water[waterName]||0)+eff
wc2[waterName]=(wc2[waterName]||0)+1

// 組み合わせ
let wwKey = weatherName + "×" + waterName
weatherWater[wwKey]=(weatherWater[wwKey]||0)+eff
wwCount[wwKey]=(wwCount[wwKey]||0)+1

let rwKey = riverName + "×" + waterName
riverWater[rwKey]=(riverWater[rwKey]||0)+eff
rwCount[rwKey]=(rwCount[rwKey]||0)+1

})

// 平均化（ゼロ除算防止）
safeAvg(river,rc)
safeAvg(point,pc)
safeAvg(weather,wc)
safeAvg(water,wc2)
safeAvg(weatherWater,wwCount)
safeAvg(riverWater,rwCount)

// 描画
draw("riverEff","河川効率",river)
draw("pointEff","ポイント効率",point)
draw("weatherEff","天候効率",weather)
draw("waterEff","水位効率",water)

draw("weatherWaterEff","天候×水位効率",weatherWater)
draw("riverWaterEff","河川×水位効率",riverWater)

})
.catch(err=>{
console.error("データ取得失敗", err)
})

}

// 安全平均
function safeAvg(obj,count){
for(let k in obj){
obj[k] = count[k] ? obj[k]/count[k] : 0
}
}

// グラフ描画
function draw(id,title,obj){

let arr=Object.entries(obj)

// データなし防止
if(arr.length===0) return

// 降順
arr.sort((a,b)=>b[1]-a[1])

let dataArr=[[title,"匹/h"]]

// TOP10
arr.slice(0,10).forEach(v=>{
dataArr.push([v[0],Number(v[1].toFixed(2))])
})

let data=google.visualization.arrayToDataTable(dataArr)

let chart=new google.visualization.ColumnChart(
document.getElementById(id)
)

chart.draw(data,{
title:title,
titleTextStyle:{color:"#7fffd4",fontSize:16,bold:true},
backgroundColor:"transparent",
legend:{
position:"top",
alignment:"end",
textStyle:{color:"#7fffd4", fontSize:13}
},
hAxis:{textStyle:{color:"white"}},
vAxis:{textStyle:{color:"white"},title:"匹/h"}
})

}

</script>

</body>
</html>
