<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AYU ANALYTICS DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#081620;
color:white;
}

.sidebar{
position:fixed;
width:200px;
height:100%;
background:#0f1f2e;
padding-top:30px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.sidebar h2{
text-align:center;
}

.sidebar h2 a{
color:#33ff99;
text-decoration:none;
font-size:22px;
}

.menu{
margin-top:40px;
}

.menu a{
display:block;
padding:15px 30px;
color:white;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
background:#1e3347;
}

.main{
margin-left:200px;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:#13212e;
padding:25px;
border-radius:16px;
box-shadow:0 0 10px rgba(0,255,170,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,255,170,0.6);
}

.title{
margin-bottom:15px;
font-size:18px;
color:#7ee7b7;
}

.chart{
height:280px;
}

.bigchart{
grid-column:span 3;
}

</style>

</head>

<body>

<div class="sidebar">

<h2><a href="index.html">AYU LAB</a></h2>

<div class="menu">

<a href="#">ダッシュボード</a> <a href="#">河川分析</a> <a href="#">竿分析</a> <a href="#">ポイント分析</a> <a href="#">写真</a>

</div>

</div>

<div class="main">

<div class="grid">

<div class="card">
<div class="title">総釣果</div>
<h1>22</h1>
</div>

<div class="card">
<div class="title">平均効率</div>
<h1>2.3</h1>
</div>

<div class="card">
<div class="title">最大サイズ</div>
<h1>25cm</h1>
</div>
